id: fleet
lifecycle: live
dispatch_priority: 260
path: /docker/fleet
design_doc: /docker/fleet/README.md
verify_cmd: python3 scripts/check_consistency.py && python3 -m py_compile controller/app.py admin/app.py studio/app.py auditor/app.py scripts/fleet_codex_nonstop.py
feedback_dir: feedback
state_file: .agent-state.json
enabled: true
accounts:
- acct-ea-fleet
account_policy:
  preferred_accounts:
  - acct-ea-fleet
  burst_accounts: []
  reserve_accounts:
  - acct-ea-repair
  - acct-ea-core
  - acct-ea-survival
  allow_chatgpt_accounts: false
  allow_api_accounts: true
  spark_enabled: false
runner:
  sandbox: danger-full-access
  approval_policy: never
  exec_timeout_seconds: 5400
  verify_timeout_seconds: 1200
  always_continue: true
  avoid_permission_escalation: true
  runtime_model: ea-coder-hard
  config_overrides:
  - 'model_provider="ea"'
  - 'model_providers.ea.name="Executive Assistant"'
  - 'model_providers.ea.base_url="http://host.docker.internal:8090/v1"'
  - 'model_providers.ea.wire_api="responses"'
  - 'model_providers.ea.http_headers={"X-EA-Principal-ID"="codex-fleet"}'
  - 'model_providers.ea.stream_idle_timeout_ms=300000'
  - 'model_providers.ea.stream_max_retries=5'
review:
  enabled: true
  mode: local
  trigger: local
  required_before_queue_advance: true
  focus_template: ""
  owner: ArchonMegalon
  repo: fleet
  base_branch: main
  branch_template: main
  bot_logins:
  - codex
queue:
-
  title: persist survival lane queue state and cache state in durable storage instead of process-local memory
  difficulty: hard
  risk_level: high
  branch_policy: feature_branch
  allowed_lanes: [core]
  required_reviewer_lane: jury
  acceptance_level: reviewed
  budget_class: standard
  latency_class: normal
-
  title: surface lane, backend, brain, and capacity posture clearly in dashboard and admin views for active and recent workers
  difficulty: medium
  risk_level: low
  branch_policy: review_branch
  allowed_lanes: [easy, repair, core, survival]
  required_reviewer_lane: core
  acceptance_level: reviewed
  budget_class: cheap
  latency_class: normal
-
  title: document health-aware lane dispatch, serialized core review handoff, and nonstop fleet self-project operations
  difficulty: easy
  risk_level: low
  branch_policy: no_merge
  allowed_lanes: [easy, repair, core]
  required_reviewer_lane: core
  acceptance_level: reviewed
  budget_class: cheap
  latency_class: batch
-
  title: generate one canonical public-status payload from design truth plus deployment/access posture, then feed it to the guide and EA instead of parallel handwritten summaries
  difficulty: hard
  risk_level: high
  branch_policy: feature_branch
  allowed_lanes: [core]
  required_reviewer_lane: jury
  acceptance_level: reviewed
  budget_class: standard
  latency_class: normal
-
  title: reconcile Fleet lifecycle and maturity language with canonical design status classes so repo-local complete, package canonical, boundary pure, and publicly promoted stop being conflated
  difficulty: medium
  risk_level: medium
  branch_policy: feature_branch
  allowed_lanes: [core]
  required_reviewer_lane: core
  acceptance_level: verified
  budget_class: standard
  latency_class: normal
-
  title: add canonical Horizons and future-capability registry work for chummer6-design so the public guide stops outrunning the blueprint on future-facing capability truth
  difficulty: hard
  risk_level: medium
  branch_policy: feature_branch
  allowed_lanes: [core]
  required_reviewer_lane: core
  acceptance_level: reviewed
  budget_class: standard
  latency_class: normal
-
  title: update canonical external-tools design to match the real LTD inventory, including Soundmadeseen, Browserly, Unmixr AI, and an explicit LTD-to-horizon capability map
  difficulty: medium
  risk_level: medium
  branch_policy: feature_branch
  allowed_lanes: [core]
  required_reviewer_lane: core
  acceptance_level: reviewed
  budget_class: standard
  latency_class: normal
queue_sources: []
