acceptance_axes:
  - id: primary_path_clarity
    rule: Each major user job exposes one obvious primary path and one bounded fallback story.
  - id: veteran_first_minute_orientation
    rule: A Chummer5a veteran can reach the real workbench and find the key landmarks in the first minute without browser ritual or dashboard detours.
  - id: veteran_deep_workflow_confidence
    rule: A Chummer5a veteran can complete dense high-frequency workflows quickly, confidently, and without ritualized detours.
  - id: desktop_familiarity_and_install_continuity
    rule: Desktop install, claim, restore, and workbench continuation preserve Chummer5a familiarity and avoid browser-ritual or dashboard-first detours on the promoted path.
  - id: desktop_head_authority_and_fallback_honesty
    rule: Avalonia is the default primary desktop head; preview may still label Blazor Desktop as bounded fallback when the release shelf, platform matrix, and public copy explicitly say so, but any gold claim requires every shipped desktop head to independently meet the flagship bar for its promised scope.
  - id: dense_workbench_budget
    rule: The promoted desktop head stays within the dense-workbench budget for spacing, chrome, visible rows, and always-visible trust posture.
  - id: authored_ruleset_experience
    rule: SR4, SR5, and SR6 preserve edition-specific terminology, effect semantics, and workflow cues where the editions materially diverge.
  - id: dense_data_expert_speed
    rule: Power-user flows stay scannable, keyboard-safe, and comfortable under dense state and repeat use.
  - id: rule_environment_honesty
    rule: The active ruleset, preset, source pack, and amend package set are visible, previewable, and portable wherever they materially affect compute.
  - id: trust_and_recovery
    rule: Crash, update, import, reconnect, and conflict states expose honest next-safe-action guidance instead of mystery failure.
  - id: data_durability_and_reversible_migration
    rule: Character, campaign, import, restore, and export flows keep governed truth durable across update, rollback, migration, and device changes.
  - id: rules_explainability
    rule: Important computed values, source anchors, and import outcomes remain explainable where users actually ask why.
  - id: custom_data_survival
    rule: Custom XML, translator, amend-package, and rule-environment overlays survive migration and upgrades with explicit downgrade or block posture when needed.
  - id: large_sheet_performance
    rule: Veteran-sized sheets, dense rosters, compare flows, and import/export tasks stay within promoted flagship performance budgets.
  - id: premium_public_coherence
    rule: Downloads, support, help, status, and in-product posture describe the same premium product reality.
  - id: split_brain_release_truth
    rule: Installer bytes, release-channel truth, public shelf truth, in-app update truth, and support truth must agree or the release is not ready.
  - id: cross_surface_design_authorship
    rule: Promoted surfaces follow one shared design contract with trustworthy theming, platform-fit layout grammar, explicit state treatment, and screenshot-backed critique evidence.
  - id: no_step_back_client_parity
    rule: Every legacy or adjacent client feature family that remains in scope has a first-class Chummer6 equivalent or an explicit bounded replacement story backed by the parity registry.
  - id: flagship_release_parity_truth
    rule: Legacy parity `covered` is not release truth; flagship release claims must clear the stricter status ladder in `FLAGSHIP_PARITY_REGISTRY.yaml`.

surfaces:
  - id: desktop_workbench
    owner_repos:
      - chummer6-ui
      - chummer6-ui-kit
      - chummer6-core
    must_prove:
      - One obvious flagship desktop head and install path per promoted platform.
      - Avalonia is the primary promoted desktop head unless the release matrix explicitly elevates Blazor Desktop to flagship for that lane.
      - Blazor Desktop only counts as fallback when the shelf labels it compatibility or fallback and Avalonia remains the primary public route.
      - If Blazor Desktop is the only user-facing desktop head or the recommended download, it must satisfy the same desktop flagship proof lanes as Avalonia for the workflows it promises.
      - A gold desktop claim is only true when every shipped desktop head independently satisfies startup, install, update, crash-recovery, feedback, workflow, and visual-familiarity proof.
      - The promoted desktop path starts with a guided product installer path instead of a framework chooser or browser ritual.
      - Install, claim, and restore land in the installer or app and open a workbench or restore continuation flow without a dashboard-first detour.
      - First-run, restore, and fix-confirmation companion moments stay dismissible, evidence-backed when caution or blocking, and never replace the actual installer, restore, update, or support action path.
      - Companion text, chips, and voice affordances remain localized across shipping locales and fall back to first-party text when EA compile, media, or microphone access is unavailable.
      - Voice mode is strictly opt-in, requires explicit user gesture, and the flagship path remains complete in text-only mode.
      - The promoted desktop head clears the veteran first-minute gate and keeps key landmarks visible without hunting.
      - Startup, install, update, crash-recovery, and feedback/reporting flows are boring on the promoted path.
      - Character, campaign, import, restore, and export state stay durable across update, rollback, migration, and device changes.
      - Important computed values, source anchors, and import outcomes remain explainable on the workbench route where trust is exercised.
      - The desktop shell keeps a real `File` menu, first-class master index and character roster routes, roster-first orientation, and other veteran Chummer5a familiarity anchors on the flagship path.
      - The promoted desktop head stays within the dense-workbench budget for spacing, chrome, visible rows, and status-strip permanence.
      - Builder, inspect, compare, explain, and active-effect flows stay dense-data comfortable for expert users.
      - SR4, SR5, and SR6 use authored labels, prompts, and interaction cues where the rules differ in meaning.
      - The active ruleset, preset, and amend-package set stay visible and previewable before a user trusts a build or explain result.
      - Light and dark themes, focus, warning, stale, preview, and recovery states are screenshot-proven against the shared surface-design contract.
      - No in-scope legacy or adjacent desktop feature family is stranded behind a missing action or support-only fallback; the parity registry must name the modern successor or bounded replacement.
      - No head may inherit the other head's workflow receipts, public-route honesty, or artifact availability.
    evidence_sources:
      - DESKTOP_CLIENT_PRODUCT_CUT.md
      - RULE_ENVIRONMENT_AND_AMEND_SYSTEM.md
      - SURFACE_DESIGN_SYSTEM_AND_AI_REVIEW_LOOP.md
      - FLAGSHIP_UI_RELEASE_GATE.md
      - DENSE_WORKBENCH_BUDGET.yaml
      - VETERAN_FIRST_MINUTE_GATE.yaml
      - PRIMARY_ROUTE_REGISTRY.yaml
      - LEGACY_CLIENT_AND_ADJACENT_PARITY.md
      - LEGACY_CLIENT_AND_ADJACENT_PARITY_REGISTRY.yaml
      - FLAGSHIP_PARITY_REGISTRY.yaml
      - PUBLIC_RELEASE_EXPERIENCE.yaml
      - GOLDEN_JOURNEY_RELEASE_GATES.yaml

  - id: rules_and_import_parity
    owner_repos:
      - chummer6-core
      - chummer5a
    must_prove:
      - Deterministic rules and explain provenance stay authoritative for promoted mechanics surfaces.
      - The release-bound engine proof pack publishes oracle-suite coverage, import-certification truth, and performance budgets for the promoted desktop release instead of relying on softer milestone or support summaries.
      - Legacy Chummer4, Chummer5a, and approved Hero Lab imports emit explicit receipts for lossy, partial, or blocked outcomes.
      - Oracle tests compare imported source facts against Chummer6-derived outcomes and surface divergences as hardening work.
      - Large-sheet, dense-roster, import, explain, and diff/apply performance budgets remain part of release-bound engine evidence.
      - Custom drugs, stacked active effects, and timing windows resolve through deterministic engine state rather than UI-side folklore.
      - Chummer5a-style amend packages and custom-data overlays either compile into the canonical rule-environment graph or emit explicit downgrade/block receipts.
      - Hero Lab and serious adjacent SR6 client oracles such as Genesis / CommLink6 either map to first-class Chummer6 successor flows or emit explicit bounded parity receipts.
    evidence_sources:
      - BUILD_LAB_PRODUCT_MODEL.md
      - RULE_ENVIRONMENT_AND_AMEND_SYSTEM.md
      - RULES_DRUG_SYSTEM.md
      - LEGACY_CLIENT_AND_ADJACENT_PARITY.md
      - LEGACY_CLIENT_AND_ADJACENT_PARITY_REGISTRY.yaml
      - METRICS_AND_SLOS.yaml

  - id: live_play_and_mobile
    owner_repos:
      - chummer6-mobile
      - chummer6-ui-kit
      - chummer6-hub
    must_prove:
      - Reconnect, replay, and resume are trustworthy under degraded-network and cross-device conditions.
      - Player and GM flows feel authored for live play instead of behaving like shrunk workbench screens.
      - The shell clearly distinguishes live, stale, offline, pending, and conflict state.
      - Missing or incompatible rule packs and amend packages are explicit before a resumed device computes against the wrong environment.
      - Mobile theming, touch targets, and state visibility are proven against the shared surface-design contract instead of inheriting desktop chrome.
    evidence_sources:
      - CAMPAIGN_WORKSPACE_AND_DEVICE_ROLES.md
      - ROAMING_WORKSPACE_AND_ENTITLEMENT_SYNC.md
      - SURFACE_DESIGN_SYSTEM_AND_AI_REVIEW_LOOP.md
      - journeys/rejoin-after-disconnect.md

  - id: public_front_door_and_support
    owner_repos:
      - chummer6-hub
      - chummer6-hub-registry
      - chummer6-ui
    must_prove:
      - chummer.run, downloads, help, status, account handoff, and support views read as one product.
      - Paying users and operators see the same release truth for install, known issues, fixes, and recovery posture.
      - The public shelf never outruns actual signed, promoted, or supportable artifacts.
      - Public routes, update posture, and installer bytes cannot disagree about what the primary desktop path is.
      - Public surfaces prove calm hierarchy, bounded CTAs, and trustworthy dark/light rendering under the shared surface-design contract.
    evidence_sources:
      - PUBLIC_RELEASE_EXPERIENCE.yaml
      - PUBLIC_DOWNLOADS_POLICY.md
      - SURFACE_DESIGN_SYSTEM_AND_AI_REVIEW_LOOP.md
      - FEEDBACK_AND_CRASH_REPORTING_SYSTEM.md
      - FEEDBACK_LOOP_RELEASE_GATE.yaml
      - FEEDBACK_PROGRESS_EMAIL_WORKFLOW.yaml

  - id: publication_and_artifacts
    owner_repos:
      - chummer6-media-factory
      - chummer6-hub-registry
      - chummer6-hub
    must_prove:
      - Preview-before-publish remains visible where canon says preview-first is mandatory.
      - Published artifacts keep manifests, provenance, compatibility, and recap-ready context attached.
      - Artifact surfaces look polished enough to justify public sharing rather than feeling like debug exports.
      - Artifact presentation preserves the shared design contract instead of falling back to utilitarian export chrome.
      - Media-backed companion scenes remain optional, localized, and backed by first-party text fallback plus publication refs.
    evidence_sources:
      - CHARACTER_LIFECYCLE_AND_LIVING_DOSSIER.md
      - journeys/publish-a-grounded-artifact.md
      - SURFACE_DESIGN_SYSTEM_AND_AI_REVIEW_LOOP.md
      - METRICS_AND_SLOS.yaml

  - id: whole_product_release_control
    owner_repos:
      - chummer6-design
      - fleet
      - executive-assistant
    must_prove:
      - Whole-product completion is derived from flagship acceptance and lived journey proof, not only empty milestone rows or green repo tests.
      - Structural readiness and flagship readiness are published as distinct planes so green milestone coverage cannot masquerade as veteran-ready product truth.
      - The published readiness planes include SR5 veteran, veteran deep workflow, public shelf, data durability, recovery trust, rules explainability, custom-data survival, large-sheet performance, SR4 parity, and SR6 parity truth.
      - The loop keeps decomposing remaining flagship gaps until the product is materially release-ready.
      - Completion, ETA, and closure proofs cite the same acceptance surfaces that the public release posture depends on.
      - Release proof names the companion packet, trigger registry, media recipes, and localization fallback contracts whenever companion surfaces are on the promoted path.
    evidence_sources:
      - FLAGSHIP_PRODUCT_BAR.md
      - FLAGSHIP_PARITY_REGISTRY.yaml
      - DENSE_WORKBENCH_BUDGET.yaml
      - VETERAN_FIRST_MINUTE_GATE.yaml
      - PRIMARY_ROUTE_REGISTRY.yaml
      - PRODUCT_GOVERNOR_AND_AUTOPILOT_LOOP.md
      - PRODUCT_HEALTH_SCORECARD.yaml
      - FEEDBACK_LOOP_RELEASE_GATE.yaml
      - FEEDBACK_PROGRESS_EMAIL_WORKFLOW.yaml

whole_product_release_rules:
  - Public release claims must stay within the surfaces that pass this matrix or carry an explicit, bounded preview explanation.
  - Structural completion and flagship replacement truth must be published separately; green milestones, empty uncovered-scope lists, or clean repo graphs are not a substitute for veteran-ready product proof.
  - A desktop release claim is incomplete if it names Blazor Desktop as available without also stating whether it is fallback or flagship for that lane.
  - A fallback head does not satisfy flagship readiness by association; if it is the only user-facing desktop route or the recommended public route, it must pass the flagship bar directly.
  - A gold claim cannot ship a secondary desktop head on shell-only, visual-only, or borrowed proof; every shipped head must independently clear the flagship bar.
  - Installer bytes, release-channel truth, public shelf truth, in-app update truth, and support truth must agree; if they disagree, the affected release-health planes stay non-ready.
  - Empty backlog views, green repo tests, or clean worktrees are not sufficient proof of flagship-grade completion by themselves.
  - Legacy parity rows marked `covered` are necessary structural evidence, but release truth is tracked in `FLAGSHIP_PARITY_REGISTRY.yaml`; `covered` alone cannot justify veteran-ready or gold-ready claims.
  - Parity doctrine must classify remaining differences as `must_match`, `may_improve`, or `may_remove_if_non_degrading`; unclassified drift does not count as flagship-ready modernization.
  - Reporter-facing support progress mail must be a sent, staged, receipt-bearing workflow from `wageslave@chummer.run`, not a vague promise that the support timeline exists somewhere.
  - Flagship release cannot claim no-step-back parity while any in-scope family marked `missing` or unbounded `partial` remains unresolved in `LEGACY_CLIENT_AND_ADJACENT_PARITY_REGISTRY.yaml`; a `partial` family is only bounded when Fleet's flagship-readiness parity audit records a proof-backed successor route for that family, and families listed under `scope.excluded` there, including `plugin-framework`, do not block the claim.
