groups:
  chummer-vnext:
    milestone_coverage_complete: false
    design_coverage_complete: false
    contract_blockers:
      - Canonical vNext session event envelopes are not yet reset across core, ui, hub, and mobile.
      - Runtime DTO, explain provenance, and play-facing contract families are still mixed-maturity across the Chummer repos.
      - The contract package plane is still not real across `Chummer.Engine.Contracts`, `Chummer.Play.Contracts`, and `Chummer.Ui.Kit`.
      - "Repo split preconditions are still unmet: `Chummer.Play.Contracts` is not a real public package, session mutation versus play transport contracts are not fully canonicalized, and Presentation still claims mobile/session shell ownership in design."
    uncovered_scope:
      - Group-level milestone coverage is incomplete for contract reset and program backlog truth.
      - Shared lockstep blockers are not yet first-class runtime data in fleet.
      - The mobile play split is new and still needs package-only dependency enforcement plus play API contract canon.
      - "The play extraction is still incomplete: Presentation still owns session/mobile surfaces while `chummer-play` is scaffold-stage."
      - The next clean split, `chummer-ui-kit`, is not yet materialized as a package-only shared UI boundary.
      - Registry/publication and media generation seams are strong enough for future repo splits but are not yet isolated as their own package or repo boundaries.
      - "The next extraction wave is now defined: `chummer-ui-kit`, `chummer-hub-registry`, and `chummer-media-factory`, but each remains blocked on contract-plane preconditions."
    remaining_milestones:
      - id: P0
        title: Contract Reset / Milestone 0 blockers
        status: open
      - id: P1
        title: Lockstep session shell readiness
        status: open
      - id: P2
        title: Explain / provenance contract alignment
        status: open
      - id: P3
        title: Asset review / generated artifact alignment
        status: open
      - id: P4
        title: Product backlog truthfulness
        status: open
      - id: P5
        title: UI kit package split for shared design-system ownership
        status: open
      - id: P6
        title: Hub registry repo split for immutable catalog and publication ownership
        status: open
      - id: P7
        title: Media factory repo split for render-only jobs, assets, and lifecycle ownership
        status: open

projects:
  core:
    milestone_coverage_complete: false
    design_coverage_complete: false
    uncovered_scope:
      - Remaining hardening and integration work is still tracked as coarse queue slices rather than milestone-mapped task coverage.
      - Cross-repo contract reset work is not yet represented as explicit core milestones.
      - Non-engine authority surfaces such as presentation contracts, run-service contracts, browser infrastructure, and legacy tools still live in the core repo root.
      - "Temporary source-project leaks such as `Chummer.Presentation.Contracts` and `Chummer.RunServices.Contracts` still need deletion after the contract plane cutover."
    remaining_milestones:
      - id: A6
        title: Post-worklist hardening and contract alignment
        status: open

  ui:
    milestone_coverage_complete: false
    design_coverage_complete: false
    uncovered_scope:
      - Session PWA/mobile shell and Coach Web ownership still live in Presentation after the `chummer-play` split.
      - "Shared design tokens, shell chrome, and accessibility/state primitives still need a package-only `Chummer.Ui.Kit` boundary."
      - Contact and relationship graph UI
      - Heat, faction, and favor continuity views
      - Calendar, ledger, and downtime planner surfaces
      - Runtime inspector, RuleProfile, and RulePack diagnostics
      - Richer Hub client UX
      - Portrait Forge selection and reroll UX depth
      - NPC Persona Studio screens
      - Coach, Shadowfeed, player dispatch, and review workflows
      - Final accessibility, deployment, and browser-constraint signoff
    remaining_milestones:
      - id: B7
        title: Additional presentation responsibility coverage beyond B1-B6
        status: open

  hub:
    milestone_coverage_complete: false
    design_coverage_complete: false
    uncovered_scope:
      - Contract reset and relay/runtime alignment are not yet represented as explicit Hub milestones.
      - Additional Hub milestone families beyond the current queued work remain unmaterialized.
      - Group-level asset review and publication seams still need explicit milestone mapping.
      - "Dedicated `Chummer.Play.Contracts` and `/api/play/*` seams are not yet public package/API reality for the new play repo."
      - "The `chummer-hub-registry` split is not yet materialized as its own repo/package boundary around catalog, publication, installs, and runtime bundle heads."
      - "The `chummer-media-factory` split is not yet materialized as a render-only asset/job boundary separated from orchestration and narrative-authoring DTOs."
      - Legacy desktop/tooling clutter still shares the run-services repo root with hosted-service code.
    remaining_milestones:
      - id: C8
        title: Additional Hub milestone families beyond the current queued work
        status: open

  mobile:
    milestone_coverage_complete: false
    design_coverage_complete: false
    uncovered_scope:
      - "Package-only dependency boundaries for `Chummer.Engine.Contracts`, `Chummer.Play.Contracts`, and `Chummer.Ui.Kit` are not yet enforced in code."
      - Contract package naming is still inconsistent between the play repo docs and package props.
      - The mobile and play-mode shell split still needs explicit player and GM role shells plus local-first sync ownership.
      - Dedicated play API, offline cache, and installable PWA hardening work remains unmaterialized.
      - Bootstrap, browser session client, and event-log persistence code are still scaffold-stage placeholders.
      - "The play repo still depends on the future `Chummer.Ui.Kit` and `Chummer.Play.Contracts` package plane that is not yet fully real."
    remaining_milestones:
      - id: D0
        title: Contract canon and play repo bootstrap
        status: open
      - id: D1
        title: Player and GM play shell extraction
        status: open
      - id: D2
        title: Local-first sync and installable play hardening
        status: open
