sections:
  - id: hero
    eyebrow: Explainable Shadowrun
    title: Shadowrun rules truth, with receipts.
    intro: Build characters, inspect rulings, and keep sessions moving with explainable math, durable state, and clear proof of what works today.
    audience: public
    route: /
  - id: product_proof
    eyebrow: Real product proof
    title: One concrete result, one visible trail, one current build
    intro: Install the current preview, inspect one visible trail, and see the same result stay legible when the next device or network wobble shows up.
    audience: public
    route: /
  - id: start_here
    eyebrow: How Chummer helps at the table
    title: What comes after the core proof
    intro: "Once the build, explanation trail, and continuity path feel trustworthy, the next product jobs are publication and improvement."
    audience: public
    route: /
  - id: why_trust_it
    eyebrow: Why trust Chummer
    title: Product claims backed by evidence
    intro: "The trust model is simple: deterministic rules truth, visible receipts, and local-first continuity."
    audience: public
    route: /
  - id: choose_your_lane
    eyebrow: Who this is for
    title: Who this is for
    intro: Choose the lane that matches how you come to the table.
    audience: public
    route: /
  - id: closing_cta
    eyebrow: Get on the list that matches your interest
    title: Create the account that keeps your place
    intro: Tell Chummer what you care about and get invited into the right lane as it opens.
    audience: public
    route: /
  - id: whats_real_now
    eyebrow: What is real today, what is preview, what is next
    title: What works today
    intro: See what is available now, what you can preview, and what is opening next.
    audience: public
    route: /now
  - id: coming_next
    eyebrow: Coming next
    title: Coming next
    intro: Each horizon names the pain, the payoff, and the next place to read deeper.
    audience: public
    route: /horizons
