id: hub
lifecycle: live
path: /docker/chummercomplete/chummer6-hub
design_doc: /docker/chummercomplete/chummer-design/products/chummer/projects/hub.md
verify_cmd: ./scripts/ai/verify.sh
feedback_dir: feedback
state_file: .agent-state.json
accounts:
- acct-hub-a
- acct-studio-a
- acct-shared-b
- acct-chatgpt-core
- acct-core-a
- acct-ea-a
- acct-chatgpt-b
- acct-chatgpt-archon
account_policy:
  preferred_accounts:
  - acct-chatgpt-archon
  - acct-chatgpt-core
  - acct-hub-a
  burst_accounts:
  - acct-shared-b
  reserve_accounts:
  - acct-chatgpt-b
  - acct-core-a
  - acct-ea-a
  - acct-studio-a
  allow_chatgpt_accounts: true
  allow_api_accounts: true
  spark_enabled: true
runner:
  sandbox: danger-full-access
  approval_policy: never
  exec_timeout_seconds: 5400
  verify_timeout_seconds: 1800
  always_continue: true
  avoid_permission_escalation: true
  config_overrides: []
review:
  enabled: true
  mode: local
  trigger: local
  required_before_queue_advance: true
  focus_template: for contract drift, compatibility regressions, and session relay hazards
  owner: ArchonMegalon
  repo: chummer6-hub
  base_branch: main
  branch_template: fleet/hub
  bot_logins:
  - codex
queue: []
queue_sources:
- kind: worklist
  path: WORKLIST.md
  mode: replace
deployment:
  status: stale_preview
  visibility: public
  surface: hosted hub preview behind legacy portal
  target_url: https://chummer.run/hub/
  summary: Public hub surface is live through the old portal shape, but it is not yet a current promoted deployment for the modern split.
enabled: true
