    progress_report: /docker/fleet/.codex-studio/published/PROGRESS_REPORT.generated.json
    progress_history: /docker/fleet/.codex-studio/published/PROGRESS_HISTORY.generated.json
    support_packets: /docker/fleet/.codex-studio/published/SUPPORT_CASE_PACKETS.generated.json
    journey_gates: /docker/fleet/.codex-studio/published/JOURNEY_GATES.generated.json
    flagship_product_readiness: /docker/fleet/.codex-studio/published/FLAGSHIP_PRODUCT_READINESS.generated.json
    completion_review_frontier: /docker/fleet/.codex-studio/published/COMPLETION_REVIEW_FRONTIER.generated.yaml
    external_proof_runbook: /docker/fleet/.codex-studio/published/EXTERNAL_PROOF_RUNBOOK.generated.md
    proof_orchestration: /docker/fleet/.codex-studio/published/PROOF_ORCHESTRATION.generated.json
    ui_linux_desktop_exit_gate: /docker/chummercomplete/chummer6-ui/.codex-studio/published/UI_LINUX_DESKTOP_EXIT_GATE.generated.json
    ui_desktop_executable_exit_gate: /docker/chummercomplete/chummer6-ui/.codex-studio/published/DESKTOP_EXECUTABLE_EXIT_GATE.generated.json
  restart_safe_runtime:
    canonical_config_surface: /docker/fleet/config/projects/fleet.yaml
    documented_at: /docker/fleet/docs/restart-safe-runtime-configuration.md
    runtime_env_overlays:
    - /docker/fleet/runtime.ea.env
    - /docker/fleet/runtime.env
    launcher_defaults:
      parallel_shards: 14
      state_root: /docker/fleet/state/chummer_design_supervisor
      clear_lock_on_boot: true
    generated_state:
      active_shards_manifest: /docker/fleet/state/chummer_design_supervisor/active_shards.json
      aggregate_state: /docker/fleet/state/chummer_design_supervisor/state.json
      account_runtime: /docker/fleet/state/chummer_design_supervisor/account_runtime.json
    cold_restart_validation:
      command: docker compose -f /docker/fleet/docker-compose.yml up -d --force-recreate fleet-design-supervisor
      expected:
      - active_shards.json is regenerated from supervisor_contract.shard_topology and launcher defaults.
      - host_memory_pressure reports the resource_policy-selected operating profile.
      - repo_backlog_audit has no active WL-305 queue item after this closeout.
  resource_policy:
    default_operating_profile: standard
    memory_dispatch_parked_poll_seconds: 300
    operating_profiles:
      maintenance:
        description: Conservative keepalive mode for proof refresh, unblock checks, and low-pressure maintenance.
        max_active_shards: 3
        memory_dispatch_reserve_gib: 8.0
        memory_dispatch_shard_budget_gib: 2.0
        memory_dispatch_warning_available_percent: 20.0
        memory_dispatch_critical_available_percent: 12.0
        memory_dispatch_warning_swap_used_percent: 60.0
        memory_dispatch_critical_swap_used_percent: 80.0
        promotion_rule: promote only when host memory is ok and the operator explicitly selects standard or burst
        demotion_rule: demote here when memory is critical, credits are guarded, or external providers are unstable
      standard:
        description: Default steady-state mode for closeout plus successor-wave work without exhausting host headroom.
        max_active_shards: 14
        memory_dispatch_reserve_gib: 2.0
        memory_dispatch_shard_budget_gib: 0.28
        memory_dispatch_warning_available_percent: 10.0
        memory_dispatch_critical_available_percent: 6.0
        memory_dispatch_warning_swap_used_percent: 75.0
        memory_dispatch_critical_swap_used_percent: 90.0
        promotion_rule: promote to burst only with healthy memory and enough open frontier to keep the wider fleet productive
        demotion_rule: demote to maintenance when memory pressure or provider instability persists across OODA passes
      burst:
        description: Aggressive capacity mode for broad closeout/successor waves when memory and credits are healthy.
        max_active_shards: 20
        memory_dispatch_reserve_gib: 2.0
        memory_dispatch_shard_budget_gib: 1.0
        memory_dispatch_warning_available_percent: 8.0
        memory_dispatch_critical_available_percent: 5.0
        memory_dispatch_warning_swap_used_percent: 90.0
        memory_dispatch_critical_swap_used_percent: 98.0
        promotion_rule: enter only when status is unblocked, memory is ok, and active queue breadth exceeds standard capacity
        demotion_rule: drop back to standard on warning memory pressure, repeated high-demand provider errors, or queue contraction
