product: chummer
surface: release_control
version: 1
last_reviewed: 2026-04-04
purpose: Canonical six-journey release gate layer for proving the campaign OS as a lived system instead of only a coherent repo graph.

journey_gates:
  - id: install_claim_restore_continue
    title: Install, claim, restore, continue
    user_promise: A person can install the flagship client, claim it, restore the right workspace, and continue safely on a known install.
    canonical_journeys:
      - journeys/install-and-update.md
      - journeys/claim-install-and-close-a-support-case.md
      - journeys/continue-on-a-second-claimed-device.md
    owner_repos:
      - chummer6-ui
      - chummer6-hub
      - chummer6-hub-registry
      - fleet
    scorecard_refs:
      slos:
        - install_and_update_coherence
        - roaming_workspace_trust
        - golden_journey_proof
      release_gates:
        - install_and_update_gate
        - rule_environment_gate
        - roaming_workspace_gate
        - golden_journey_gate
      health_scorecards:
        - golden_journey_health
        - campaign_middle_health
        - rule_environment_trust
    fleet_gate:
      required_artifacts:
        - status_plane
        - progress_report
        - support_packets
      minimum_history_snapshots: 2
      target_history_snapshots: 4
      repo_source_proof:
        - repo: chummer6-hub
          path: .codex-studio/published/HUB_LOCAL_RELEASE_PROOF.generated.json
          must_contain:
            - '"contract_name": "chummer6-hub.local_release_proof"'
            - '"status": "passed"'
          max_age_hours: 48
          generated_at_fields:
            - generated_at
            - generatedAt
        - repo: chummer6-hub-registry
          path: .codex-studio/published/RELEASE_CHANNEL.generated.json
          json_must_equal:
            releaseProof.status: passed
            desktopTupleCoverage.missingRequiredPlatforms: []
            desktopTupleCoverage.missingRequiredPlatformHeadPairs: []
            desktopTupleCoverage.missingRequiredPlatformHeadRidTuples: []
          json_must_be_one_of:
            status:
              - published
              - publishable
          json_must_be_non_empty_string:
            contract_name: true
            releaseProof.generatedAt: true
            rolloutReason: true
            supportabilitySummary: true
            knownIssueSummary: true
            fixAvailabilitySummary: true
          must_contain:
            - '"desktopTupleCoverage"'
            - '"releaseProof"'
            - '"status": "passed"'
            - '"missingRequiredPlatforms"'
            - '"missingRequiredPlatformHeadPairs"'
            - '"missingRequiredPlatformHeadRidTuples"'
          max_age_hours: 48
          generated_at_fields:
            - generated_at
            - generatedAt
        - repo: chummer6-ui
          path: Chummer.Desktop.Runtime/DesktopInstallLinkingRuntime.cs
          must_contain:
            - BuildSupportPortalRelativePathForInstall
            - BuildSupportPortalRelativePathForWorkspace
        - repo: chummer6-ui
          path: .codex-studio/published/DESKTOP_EXECUTABLE_EXIT_GATE.generated.json
          json_must_equal:
            local_blocking_findings_count: 0
            evidence.hub_registry_root_trusted_for_startup_smoke_proof: true
            evidence.flagship_status: pass
            evidence.visual_familiarity_status: pass
            evidence.workflow_execution_status: pass
            evidence.receipt_scope.windows_gate:avalonia:win-x64.within_repo_root: true
            evidence.receipt_scope.windows_gate:blazor-desktop:win-x64.within_repo_root: true
            evidence.receipt_scope.linux_gate:avalonia:linux-x64.within_repo_root: true
            evidence.receipt_scope.linux_gate:blazor-desktop:linux-x64.within_repo_root: true
            evidence.receipt_scope.macos_gate:avalonia:osx-arm64.within_repo_root: true
            evidence.receipt_scope.macos_gate:blazor-desktop:osx-arm64.within_repo_root: true
          must_contain:
            - '"contract_name": "chummer6-ui.desktop_executable_exit_gate"'
            - '"local_blocking_findings_count": 0'
            - '"windows_gate:avalonia:win-x64"'
            - '"windows_gate:blazor-desktop:win-x64"'
            - '"linux_gate:avalonia:linux-x64"'
            - '"linux_gate:blazor-desktop:linux-x64"'
            - '"macos_gate:avalonia:osx-arm64"'
            - '"macos_gate:blazor-desktop:osx-arm64"'
            - '"hub_registry_root_trusted_for_startup_smoke_proof": true'
          max_age_hours: 48
          generated_at_fields:
            - generated_at
            - generatedAt
        - repo: chummer6-mobile
          path: .codex-studio/published/MOBILE_LOCAL_RELEASE_PROOF.generated.json
          must_contain:
            - '"contract_name": "chummer6-mobile.local_release_proof"'
            - '"status": "passed"'
            - '"install_claim_restore_continue"'
          max_age_hours: 48
          generated_at_fields:
            - generated_at
            - generatedAt
      required_project_posture:
        - project_id: ui
          minimum_stage: pre_repo_local_complete
          target_stage: publicly_promoted
          minimum_deployment_posture: protected_preview
          target_deployment_posture: public
        - project_id: hub
          minimum_stage: pre_repo_local_complete
          target_stage: publicly_promoted
          minimum_deployment_posture: protected_preview
          target_deployment_posture: public
        - project_id: hub-registry
          minimum_stage: boundary_pure
          target_stage: boundary_pure

