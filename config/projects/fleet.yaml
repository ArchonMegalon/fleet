    kind: materializer
    command: python3 scripts/materialize_fleet_queue_overlay.py --repo-root /docker/fleet --project-id fleet
    freshness_window_minutes: 90
    retry:
      max_attempts: 2
      delay_seconds: 10
      retry_on:
      - transient_io
    dependencies: []
    outputs:
    - path: /docker/fleet/.codex-studio/published/QUEUE.generated.yaml
      freshness_window_minutes: 90
      required: true
  - id: package_compile_overlay
