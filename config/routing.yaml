spider:
  token_alliance_window_hours: 24
  classification_mode: evidence_v1
  escalate_to_complex_after_failures: 2
  feedback_file_window: 2
  evidence_window_runs: 120
  evidence_min_sample: 6
  # Raw model prices remain a compatibility fallback for account selection and analytics.
  # Lane preferences below are the scheduler's routing truth.
  # Easy and groundwork are the fleet-wide default path; repair/core stay explicit task exceptions.
  price_table:
    gpt-5.4:
      input: 2.5
      cached_input: 0.25
      output: 15.0
    gpt-5-mini:
      input: 0.25
      cached_input: 0.025
      output: 2.0
    gpt-5-nano:
      input: 0.05
      cached_input: 0.005
      output: 0.4
    gpt-5.3-codex:
      input: 1.75
      cached_input: 0.175
      output: 14.0
    gpt-5.3-codex-spark:
      input: 0.0
      cached_input: 0.0
      output: 0.0
  tier_preferences:
    inspect:
      lane_preferences: [easy]
      models:
      - gpt-5-nano
      - gpt-5-mini
      - gpt-5.4
      reasoning_effort: none
      estimated_output_tokens: 384
    draft:
      lane_preferences: [easy, groundwork]
      models:
      - gpt-5-mini
      - gpt-5.4
      reasoning_effort: low
      estimated_output_tokens: 768
    groundwork:
      lane_preferences: [groundwork, easy]
      models:
      - gpt-5-mini
      - gpt-5.4
      reasoning_effort: medium
      estimated_output_tokens: 1536
    micro_edit:
      lane_preferences: [easy, groundwork, repair]
      models:
      - gpt-5.3-codex-spark
      - gpt-5-mini
      - gpt-5.4
      reasoning_effort: none
      estimated_output_tokens: 768
    bounded_fix:
      lane_preferences: [easy, groundwork, repair, core_booster]
      models:
      - gpt-5.3-codex-spark
      - gpt-5-mini
      - gpt-5.4
      reasoning_effort: low
      estimated_output_tokens: 1536
    multi_file_impl:
      lane_preferences: [groundwork, easy, repair, core_booster]
      models:
      - gpt-5.4
      - gpt-5.3-codex
      reasoning_effort: low
      estimated_output_tokens: 2048
    cross_repo_contract:
      lane_preferences: [core_authority, core]
      models:
      - gpt-5.4
      - gpt-5.3-codex
      reasoning_effort: medium
      estimated_output_tokens: 4096

core_backends:
  ea_managed:
    auth_class: ea
    runtime_model: ea-coder-hard-batch
    provider_hint_order: [onemin]
    merge_authority: false
    owner_category: operator
  ea_authority:
    auth_class: ea
    runtime_model: ea-coder-hard-batch
    provider_hint_order: [onemin]
    merge_authority: true
    owner_category: operator
  ea_rescue:
    auth_class: ea
    runtime_model: ea-coder-hard-batch
    provider_hint_order: [onemin]
    merge_authority: false
    owner_category: operator
  chatgpt_participant:
    auth_class: chatgpt_auth_json
    runtime_model: gpt-5.4
    provider_hint_order: [chatgpt_direct]
    merge_authority: false
    owner_category: participant
  chatgpt_deep:
    auth_class: chatgpt_auth_json
    runtime_model: gpt-5.4
    provider_hint_order: [chatgpt_direct, chatplayground]
    merge_authority: false
    owner_category: participant

