          minimum_deployment_posture: protected_preview
          target_deployment_posture: public
        - project_id: fleet
          minimum_stage: package_canonical
          target_stage: boundary_pure

rules:
  - A journey gate is blocked when required published artifacts are missing or stale, or when an owning project falls below its minimum stage or deployment posture.
  - A journey gate is warning when the minimum posture is met but the target posture or history depth is still not boring.
  - Fleet publish readiness must consume this registry through a generated JOURNEY_GATES artifact rather than by ad hoc prose.
