      - transient_io
    dependencies: []
    outputs:
    - path: /docker/fleet/.codex-studio/published/SUPPORT_CASE_PACKETS.generated.json
      freshness_window_minutes: 90
      required: true
  - id: public_progress
    title: Materialize public progress and history
    kind: materializer
    command: python3 scripts/materialize_public_progress_report.py --out .codex-studio/published/PROGRESS_REPORT.generated.json --history-out .codex-studio/published/PROGRESS_HISTORY.generated.json
    freshness_window_minutes: 90
    retry:
      max_attempts: 2
      delay_seconds: 10
      retry_on:
      - transient_io
    dependencies:
    - support_packets
    outputs:
    - path: /docker/fleet/.codex-studio/published/PROGRESS_REPORT.generated.json
      freshness_window_minutes: 90
      required: true
    - path: /docker/fleet/.codex-studio/published/PROGRESS_HISTORY.generated.json
