product: chummer
surface: chummer.run
version: 1
guest_readable_channels:
  - stable
  - preview
release_notes_summary: The current preview centers one clear public download, a visible proof trail, and support guidance that matches the shelf you can actually use today.
flagship_grade_summary: A public release is only truly ready when downloads, install/update help, recovery, support, and the product surfaces behind them feel like one premium, honest product rather than a technically functional preview bundle.
flagship_acceptance_source: FLAGSHIP_RELEASE_ACCEPTANCE.yaml
desktop_flagship_head: Chummer.Avalonia
desktop_fallback_head: Chummer.Blazor.Desktop
desktop_cut_summary: The current desktop wave treats Avalonia as the flagship native preview head, keeps Blazor Desktop as the bounded compatibility fallback only while Avalonia remains the promoted primary route, and distinguishes promoted installers from manual packages when they differ.
supported_locale_targets:
  - en-US
  - de-DE
  - fr-FR
  - ja-JP
  - pt-BR
  - zh-CN
known_issues_label: Known issues and install help
known_issues_href: /help#install-update
install_help_label: Need install help?
install_help_href: /help#install-update
update_posture_summary: The release page is the source of truth for the current preview channel, the public download currently available for each platform, and whether setup is straightforward or still manual.
flagship_release_rules:
  - The shelf must present one obvious primary download path per supported platform.
  - Avalonia is the flagship desktop head. Blazor Desktop is only a compatibility fallback when the platform matrix and release copy both say so.
  - If Blazor Desktop is the only visible desktop head for a lane or the recommended download, the release page must treat it as the flagship route and require flagship proof rather than fallback proof.
  - The flagship release path starts with a guided Chummer product installer path first and opens the real workbench or restore continuation flow on first launch.
  - The happy path must not send the user to a browser to copy or paste a claim code by hand.
  - Public release claims must stay within the surfaces that currently pass FLAGSHIP_RELEASE_ACCEPTANCE.yaml or carry a bounded preview explanation.
  - Help, known issues, claim/recovery guidance, and update posture must agree with the actual released artifacts.
  - The public shelf must not overclaim platform or feature posture just because internal proof artifacts exist.
  - Flagship desktop quality requires polished install, update, crash-recovery, and support flows in addition to build/startup proof.
  - Claim and restore guidance must not imply that a recovered workspace is safe when required rule packs or amend packages are missing locally.
default_public_channel_label: Preview channel
unpublished_build_label: Current preview build
build_label_prefix: Build
public_channel_labels:
  - id: stable
    label: Public release
  - id: preview
    label: Preview channel
  - id: docker
    label: Preview channel
  - id: local
    label: Preview channel
guest_gate_heading: Preview access
guest_gate_summary: Create a Chummer account first when the current preview requires a linked download handoff, recovery path, or support history from the first launch.
guest_gate_primary_label: Create account to get preview
guest_gate_secondary_label: Already have an account? Sign in
signed_in_dispatch_heading: Keep this install linked from the first launch
signed_in_dispatch_summary: Start the same published download from the signed-in handoff page and follow the platform-specific guided install path that keeps the install linked to your account from the first successful launch.
signed_in_dispatch_steps:
  - Start from the signed-in handoff page for the platform you are installing.
  - Follow the platform-specific guided install path; when macOS is on the unsigned-preview lane, that path begins with a short-lived Terminal install command.
  - The happy path must apply the install claim automatically on first successful launch instead of depending on a manual claim-code ritual.
  - If Chummer reports missing rule packs or amend packages during restore, follow the explicit recovery guidance before trusting the restored result.
  - Reopen Devices and access later only for recovery, relinking, or support follow-through.
install_steps:
  - Download the current published package for your platform.
  - Finish setup for that package, then launch Chummer.
  - Create an account when you want download receipts, recovery, and support history to stay attached.
  - If a restored runner or campaign needs rule packs or amend packages that are not present locally, Chummer must say so before compute continues.
  - Use Devices and access later if you need to reconnect a downloaded copy back to the same account.
account_required_install_steps:
  - Create your Chummer account first.
  - Start the published download from the signed-in handoff page.
  - Finish setup for that package and launch Chummer.
  - Follow the platform-specific guided install path where one exists; macOS unsigned preview begins with a Terminal command that streams the setup assistant.
  - Resolve any shown rule-environment or package mismatch before trusting the restored workspace.
  - Let the happy path attach the install automatically; use claim/recovery details only when Chummer explicitly falls back to recovery mode.
windows_requirements:
  - 64-bit Windows 10 or newer.
  - Enough free disk space for the installed preview plus future updates.
  - A normal user install path; no custom runtime selection needed for the recommended build.
  - Portable `.exe` handoff is a bounded fallback, not the primary public CTA.
linux_requirements:
  - 64-bit Linux with the currently published preview package support.
  - Use the current public package when available; use manual packages only for advanced or support-directed setup.
  - Linux preview is secondary to Windows and should not promise more than the currently published package lane can support.
macos_requirements:
  - The public downloads page may expose a macOS install-command preview before notarized promotion, but that lane must stay account-gated and clearly labeled as an unsigned preview.
  - The Mac default action is a Terminal command, not a downloaded unsigned `.command` file and not the raw DMG. The command must stream a guided setup assistant that downloads the current DMGs, removes quarantine, lets the user choose which supported desktop heads to install, lets the user choose `/Applications` versus `~/Applications`, and offers to open the selected apps when setup finishes.
  - The guided setup assistant must apply the baked install claim codes automatically on first launch instead of asking the user to copy codes by hand.
  - A guest-visible raw macOS `.dmg` stays off the shelf until a signed, notarized, startup-smoke-proven promotion lands.
