events {}

http {
  server {
    listen 8090;
    server_name _;
    client_max_body_size 20m;
    root /usr/share/nginx/html;
    absolute_redirect off;
    port_in_redirect off;
    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 5s;

    set $controller_upstream fleet-controller:8090;
    set $studio_upstream fleet-studio:8091;
    set $admin_upstream fleet-admin:8092;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    location = /health {
      proxy_pass http://$controller_upstream;
    }

    location = / {
      return 302 /dashboard/;
    }

    location = /dashboard {
      return 302 /dashboard/;
    }

    location ~ ^/dashboard/(bridge\.(js|css))$ {
      add_header Cache-Control "no-store";
      add_header Pragma "no-cache";
      expires -1;
      try_files $uri =404;
    }

    location /dashboard/ {
      if ($cookie_fleet_operator_session = "") {
        return 302 /admin/login?next=%2Fdashboard%2F;
      }
      add_header Cache-Control "no-store";
      add_header Pragma "no-cache";
      expires -1;
      try_files $uri $uri/ /dashboard/index.html;
    }

    location /api/studio/ {
      proxy_pass http://$studio_upstream;
    }

    location /api/admin/ {
      proxy_pass http://$admin_upstream;
    }

    location /api/cockpit/ {
      proxy_pass http://$admin_upstream;
    }

    location /api/public/ {
      proxy_pass http://$admin_upstream;
    }

    location = /progress {
      proxy_pass http://$admin_upstream;
    }

    location /progress/ {
      proxy_pass http://$admin_upstream;
    }

    location = /api/github/webhooks {
      proxy_pass http://$controller_upstream;
    }

    location /admin/ {
      proxy_pass http://$admin_upstream;
    }

    location = /admin {
      proxy_pass http://$admin_upstream;
    }

    location /studio/ {
      proxy_pass http://$studio_upstream;
    }

    location = /studio {
      proxy_pass http://$studio_upstream;
    }

    location = /spider {
      proxy_pass http://$controller_upstream;
    }

    location / {
      proxy_pass http://$controller_upstream;
    }
  }
}
