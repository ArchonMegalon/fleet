quartermaster:
  enabled: true
  mode: enforce
  driver: controller_tick
  contract_name: fleet.capacity_plan
  contract_version: 2026-03-22
  baseline_tick_seconds: 600
  event_tick_min_seconds: 90
  plan_ttl_seconds: 900
  max_scale_up_per_tick: 20
  max_scale_down_per_tick: 20
  min_worker_dwell_seconds: 900
  idle_drain_seconds: 180
  service_floor:
    core_authority: 1
    core_rescue: 1
  telemetry:
    provider: ea_onemin_manager
    onemin_manager: ea
    onemin_query_mode: manager
  credit:
    require_survive_until_next_topup: true
    topup_cycle_hours_fallback: 720
    reserve_buffer_hours: 6
    cycle_reserve_percent: 8
    minimum_headroom_hours: 4
    soft_target_unused_credit_percent_max: 12
  useful_work:
    minimum_queue_depth_per_booster: 1
    queue_depth_signal: premium_queue_depth
    eligible_task_classes:
    - bounded_fix
    - multi_file_impl
  incidents:
    llm_fallback_enabled: false
    triggers:
    - capacity_contract_changed
    - onemin_probe_delta
    - topup_eta_changed
    - review_backpressure
    - audit_debt
    - booster_idle
    - worker_no_progress
    - scope_ready_changed
    - slot_probe_stale
    - sponsor_lane_change
    typed_findings:
    - credit_runway_risk
    - booster_idle
    - scope_contention
    - review_backpressure
    - audit_debt
    - worker_no_progress
    - contract_drift
    - slot_probe_stale
