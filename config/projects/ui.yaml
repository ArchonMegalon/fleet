id: ui
lifecycle: live
path: /docker/chummercomplete/chummer6-ui
design_doc: /docker/chummercomplete/chummer-design/products/chummer/projects/ui.md
verify_cmd: ./scripts/ai/verify.sh
feedback_dir: feedback
state_file: .agent-state.json
accounts:
- acct-ui-a
- acct-studio-a
- acct-shared-b
- acct-chatgpt-core
- acct-core-a
- acct-ea-a
- acct-chatgpt-b
- acct-chatgpt-archon
account_policy:
  preferred_accounts:
  - acct-chatgpt-archon
  - acct-chatgpt-core
  - acct-ui-a
  burst_accounts:
  - acct-shared-b
  reserve_accounts:
  - acct-chatgpt-b
  - acct-core-a
  - acct-ea-a
  - acct-studio-a
  allow_chatgpt_accounts: true
  allow_api_accounts: true
  spark_enabled: true
runner:
  sandbox: danger-full-access
  approval_policy: never
  exec_timeout_seconds: 5400
  verify_timeout_seconds: 1800
  always_continue: true
  avoid_permission_escalation: true
  config_overrides:
  - 'mcp_servers.ea.command="python3"'
  - 'mcp_servers.ea.args=["/docker/fleet/scripts/ea_mcp_bridge.py"]'
  - 'mcp_servers.ea.env_vars=["EA_MCP_BASE_URL","EA_MCP_API_TOKEN","EA_MCP_PRINCIPAL_ID","EA_MCP_TIMEOUT_SECONDS"]'
  - 'mcp_servers.ea.enabled_tools=["ea.list_skills","ea.get_skill","ea.compile_plan","ea.execute_plan","ea.execute_tool","ea.context_pack"]'
  - 'mcp_servers.ea.tool_timeout_sec=120'
  - 'mcp_servers.ea.required=false'
review:
  enabled: true
  mode: github
  trigger: manual_comment
  fallback_mode: local
  fallback_conditions: degraded_or_stalled
  required_before_queue_advance: true
  focus_template: for regressions, missing tests, and offline-state hazards
  owner: ArchonMegalon
  repo: chummer6-ui
  base_branch: main
  branch_template: fleet/ui
  bot_logins:
  - codex
queue: []
queue_sources:
- kind: worklist
  path: WORKLIST.md
  mode: replace
deployment:
  status: stale_preview
  visibility: public
  surface: workbench/browser preview behind legacy portal
  target_url: https://chummer.run/blazor/
  summary: Public browser workbench preview is live at /blazor/, but it still reflects the older portal-era surface instead of a current promoted workbench deployment.
enabled: true
