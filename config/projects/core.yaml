id: core
lifecycle: live
path: /docker/chummercomplete/chummer6-core
design_doc: /docker/chummercomplete/chummer-design/products/chummer/projects/core.md
verify_cmd: ./scripts/ai/verify.sh
feedback_dir: feedback
state_file: .agent-state.json
accounts:
- acct-core-a
- acct-studio-a
- acct-shared-b
- acct-chatgpt-core
- acct-chatgpt-b
account_policy:
  preferred_accounts:
  - acct-chatgpt-b
  - acct-core-a
  - acct-chatgpt-core
  burst_accounts:
  - acct-shared-b
  reserve_accounts:
  - acct-studio-a
  allow_chatgpt_accounts: true
  allow_api_accounts: true
  spark_enabled: true
runner:
  sandbox: danger-full-access
  approval_policy: never
  exec_timeout_seconds: 5400
  verify_timeout_seconds: 1800
  always_continue: true
  avoid_permission_escalation: true
  config_overrides: []
review:
  enabled: true
  mode: github
  trigger: manual_comment
  required_before_queue_advance: true
  focus_template: for regressions, missing tests, and contract drift
  owner: ArchonMegalon
  repo: chummer6-core
  base_branch: main
  branch_template: fleet/core
  bot_logins:
  - codex
queue:
- Isolation and compile recovery
- Contract hardening
- Structured Explain API hardening
- Runtime/RulePack determinism hardening
- Backend primitives for Build Lab / ledger / timeline / validation / explain hooks
enabled: true
queue_sources: []
