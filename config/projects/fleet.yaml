id: fleet
lifecycle: live
dispatch_priority: 260
path: /docker/fleet
design_doc: /docker/fleet/README.md
verify_cmd: python3 scripts/check_consistency.py && python3 scripts/materialize_status_plane.py --status-json-out state/status-plane.verify.json && python3 scripts/verify_status_plane_semantics.py --status-plane .codex-studio/published/STATUS_PLANE.generated.yaml --status-json state/status-plane.verify.json && python3 -m py_compile controller/app.py admin/app.py studio/app.py auditor/app.py quartermaster/app.py scripts/fleet_codex_nonstop.py admin/studio_views.py scripts/materialize_support_case_packets.py && python3 -m pytest -q tests/test_studio_publish_contract.py tests/test_materialize_support_case_packets.py tests/test_published_work_package_contracts.py tests/test_materialize_compile_manifest.py::test_published_compile_manifest_matches_generated_payload tests/test_public_progress_report.py::PublicProgressReportTests::test_published_progress_report_matches_generated_contract tests/test_design_mirror_product_contracts.py tests/test_admin_studio.py tests/test_capacity_plane.py tests/test_quartermaster_service.py tests/test_quartermaster_ooda_e2e.py tests/test_work_package_collision_regressions.py tests/test_materialize_status_plane.py tests/test_materialize_public_progress_report.py tests/test_readiness_taxonomy.py
feedback_dir: feedback
state_file: .agent-state.json
enabled: true
accounts:
- acct-ea-groundwork
- acct-ea-groundwork-2
- acct-ea-fleet
- acct-ea-core
account_policy:
  preferred_accounts:
  - acct-ea-core
  - acct-ea-groundwork
  - acct-ea-fleet
  burst_accounts:
  - acct-ea-groundwork-2
  reserve_accounts:
  - acct-ea-repair
  - acct-ea-review-light
  - acct-ea-jury
  - acct-ea-core
  - acct-ea-survival
  emergency_chatgpt_fallback_accounts:
  - acct-chatgpt-archon
  allow_chatgpt_accounts: false
  allow_api_accounts: true
  spark_enabled: false
booster_pool_contract:
  pool: core_booster
  authority_lane: core_authority
  booster_lane: core_booster
  rescue_lane: core_rescue
  review_fabric: default
  audit_fabric: default
  project_safety_cap: 20
queue_task_defaults:
  allowed_lanes:
  - core_booster
  allow_credit_burn: true
  allow_paid_fast_lane: false
  premium_required: true
worker_topology:
  groundwork_primary: acct-ea-groundwork
  groundwork_shadow: acct-ea-groundwork-2
  easy_primary: acct-ea-fleet
  core_primary: acct-ea-core
  jury_reviewer: acct-ea-jury
  core_rescue: acct-ea-core
runner:
  sandbox: danger-full-access
  approval_policy: never
  exec_timeout_seconds: 5400
  exec_idle_timeout_seconds: 360
  restart_cooldown_seconds: 5
  exec_stalled_account_backoff_threshold: 2
  exec_stalled_account_backoff_seconds: 5
  verify_timeout_seconds: 1200
  always_continue: true
  avoid_permission_escalation: true
  runtime_model: ea-groundwork-gemini
review:
  enabled: true
  mode: local
  trigger: local
  required_before_queue_advance: true
  focus_template: ""
  owner: ArchonMegalon
  repo: fleet
  base_branch: main
  branch_template: main
  bot_logins:
  - codex
  preferred_accounts:
  - acct-chatgpt-archon
workflow:
  kind: groundwork_review_loop
  max_review_rounds: 3
  first_review_required: true
  jury_acceptance_required: true
  core_rescue_after_round: 0
queue: []
queue_sources: []
