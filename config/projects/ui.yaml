id: ui
lifecycle: live
path: /docker/chummercomplete/chummer-presentation
design_doc: /docker/chummercomplete/chummer-presentation.design.v2.md
verify_cmd: ./scripts/ai/verify.sh
feedback_dir: feedback
state_file: .agent-state.json
accounts:
- acct-ui-a
- acct-studio-a
- acct-shared-b
- acct-chatgpt-core
- acct-core-a
- acct-ea-a
- acct-chatgpt-b
account_policy:
  preferred_accounts:
  - acct-ui-a
  burst_accounts:
  - acct-shared-b
  reserve_accounts:
  - acct-chatgpt-core
  - acct-core-a
  - acct-ea-a
  - acct-chatgpt-b
  - acct-studio-a
  allow_chatgpt_accounts: true
  allow_api_accounts: true
  spark_enabled: true
runner:
  sandbox: workspace-write
  approval_policy: never
  exec_timeout_seconds: 5400
  verify_timeout_seconds: 1800
  always_continue: true
  avoid_permission_escalation: true
  config_overrides: []
review:
  enabled: true
  mode: github
  trigger: manual_comment
  required_before_queue_advance: true
  focus_template: for regressions, missing tests, and offline-state hazards
  owner: ArchonMegalon
  repo: chummer-presentation
  base_branch: main
  branch_template: fleet/ui
  bot_logins:
  - codex
queue: []
queue_sources:
- kind: worklist
  path: WORKLIST.md
  mode: replace
deployment:
  status: stale_preview
  visibility: public
  surface: workbench/browser preview behind legacy portal
  target_url: https://chummer.run/blazor/
  summary: Public browser workbench preview is live at /blazor/, but it still reflects the older portal-era surface instead of a current promoted workbench deployment.
enabled: true
