id: guide
lifecycle: signoff_only
path: /docker/chummercomplete/Chummer6
design_doc: /docker/chummercomplete/chummer-design/products/chummer/projects/guide.md
verify_cmd: test -f README.md && test -f START_HERE.md && test -f WHAT_CHUMMER6_IS.md && test -f WHERE_TO_GO_DEEPER.md && test ! -e WHERE_THE_REAL_TRUTH_LIVES.md && test -f GLOSSARY.md && test -f FAQ.md && test -f NOW/current-phase.md && test -f NOW/current-status.md && test -f NOW/public-surfaces.md && test -f PARTS/README.md && test -f PARTS/core.md && test -f PARTS/ui.md && test -f PARTS/hub.md && test -f PARTS/mobile.md && test -f PARTS/ui-kit.md && test -f PARTS/hub-registry.md && test -f PARTS/media-factory.md && test -f PARTS/design.md && test ! -e PARTS/presentation.md && test ! -e PARTS/run-services.md && test ! -e PARTS/play.md && test ! -e PARTS/fleet.md && test -f HORIZONS/README.md && test -f HORIZONS/karma-forge.md && test -f HORIZONS/nexus-pan.md && test -f HORIZONS/alice.md && test -f HORIZONS/jackpoint.md && test -f HORIZONS/ghostwire.md && test -f HORIZONS/mirrorshard.md && test -f HORIZONS/rule-x-ray.md && test -f HORIZONS/heat-web.md && test -f HORIZONS/run-passport.md && test -f HORIZONS/command-casket.md && test -f HORIZONS/tactical-pulse.md && test -f HORIZONS/blackbox-loadout.md && test -f HORIZONS/persona-echo.md && test -f HORIZONS/shadow-market.md && test -f HORIZONS/evidence-room.md && test -f HORIZONS/threadcutter.md && test -f UPDATES/2026-03.md && test ! -d scripts && test ! -d src && test ! -d tests && test ! -e VISION.md && test ! -e ROADMAP.md && test ! -e ARCHITECTURE.md && test ! -e WORKLIST.md && test ! -e CONTRACT_SETS.yaml && test ! -e GROUP_BLOCKERS.md && test ! -e runtime-instructions.generated.md && test ! -e QUEUE.generated.yaml
feedback_dir: UPDATES
state_file: .agent-state.json
enabled: true
accounts: []
runner:
  sandbox: danger-full-access
  approval_policy: never
  exec_timeout_seconds: 1800
  verify_timeout_seconds: 300
  always_continue: true
  avoid_permission_escalation: true
  config_overrides:
  - 'mcp_servers.ea.command="python3"'
  - 'mcp_servers.ea.args=["/docker/fleet/scripts/ea_mcp_bridge.py"]'
  - 'mcp_servers.ea.env_vars=["EA_MCP_BASE_URL","EA_MCP_API_TOKEN","EA_MCP_PRINCIPAL_ID","EA_MCP_TIMEOUT_SECONDS","EA_MCP_MODEL"]'
  - 'mcp_servers.ea.enabled_tools=["ea.list_skills","ea.get_skill","ea.compile_plan","ea.execute_plan","ea.execute_tool","ea.context_pack"]'
  - 'mcp_servers.ea.tool_timeout_sec=120'
  - 'mcp_servers.ea.required=false'
review:
  enabled: false
  mode: local
  trigger: local
  required_before_queue_advance: false
  focus_template: ""
  owner: ArchonMegalon
  repo: Chummer6
  base_branch: main
  branch_template: main
  bot_logins:
  - codex
queue: []
queue_sources: []
