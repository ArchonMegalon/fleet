  - id: report_cluster_release_notify
    title: Report, cluster, release, notify
    user_promise: A user can report pain, follow honest case state, and only receive a fixed notice once the fix actually reaches their channel.
    canonical_journeys:
      - journeys/claim-install-and-close-a-support-case.md
      - journeys/install-and-update.md
    owner_repos:
      - chummer6-hub
      - chummer6-ui
      - chummer6-hub-registry
      - fleet
      - executive-assistant
    scorecard_refs:
      slos:
        - support_and_closure_honesty
        - install_and_update_coherence
        - golden_journey_proof
      release_gates:
        - campaign_and_closure_gate
        - install_and_update_gate
        - golden_journey_gate
      health_scorecards:
        - golden_journey_health
        - support_and_feedback_closure
        - control_loop_integrity
    fleet_gate:
      required_artifacts:
        - status_plane
        - progress_report
        - support_packets
      minimum_history_snapshots: 2
      target_history_snapshots: 4
      repo_source_proof:
        - repo: chummer6-hub
          path: .codex-studio/published/HUB_LOCAL_RELEASE_PROOF.generated.json
          must_contain:
            - '"report_cluster_release_notify"'
            - '"/account/support"'
            - '"/contact"'
      require_support_freshness: true
      require_support_closure_waiting_zero: true
      require_support_update_required_routes_to_downloads: true
      required_project_posture:
        - project_id: hub
          minimum_stage: pre_repo_local_complete
          target_stage: publicly_promoted
          minimum_deployment_posture: protected_preview
          target_deployment_posture: public
        - project_id: ui
          minimum_stage: pre_repo_local_complete
          target_stage: publicly_promoted
          minimum_deployment_posture: protected_preview
          target_deployment_posture: public
        - project_id: hub-registry
          minimum_stage: boundary_pure
          target_stage: boundary_pure

  - id: organize_community_and_close_loop
    title: Organize community and close the loop
    user_promise: Organizer and community operation stays on the same account, campaign, and closure spine instead of splintering into side spreadsheets and oral tradition.
    canonical_journeys:
      - journeys/organize-a-community-and-close-the-loop.md
      - journeys/claim-install-and-close-a-support-case.md
    owner_repos:
      - chummer6-hub
      - fleet
      - executive-assistant
      - chummer6-design
    scorecard_refs:
      slos:
        - hosted_identity_and_participation
        - support_and_closure_honesty
        - golden_journey_proof
      release_gates:
        - public_surface_honesty
        - campaign_and_closure_gate
        - golden_journey_gate
      health_scorecards:
