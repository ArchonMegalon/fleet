id: design
lifecycle: dispatchable
dispatch_priority: 250
path: /docker/chummercomplete/chummer-design
design_doc: /docker/chummercomplete/chummer-design/products/chummer/ARCHITECTURE.md
verify_cmd: bash scripts/ai/verify.sh
feedback_dir: feedback
state_file: .agent-state.json
enabled: true
accounts:
- acct-studio-a
- acct-shared-b
- acct-ui-a
- acct-chatgpt-core
- acct-core-a
- acct-ea-a
- acct-chatgpt-b
- acct-chatgpt-archon
account_policy:
  preferred_accounts:
  - acct-chatgpt-archon
  - acct-chatgpt-core
  - acct-studio-a
  burst_accounts:
  - acct-shared-b
  reserve_accounts:
  - acct-chatgpt-b
  - acct-core-a
  - acct-ea-a
  - acct-ui-a
  allow_chatgpt_accounts: true
  allow_api_accounts: true
  spark_enabled: true
runner:
  sandbox: danger-full-access
  approval_policy: never
  exec_timeout_seconds: 5400
  verify_timeout_seconds: 1800
  always_continue: true
  avoid_permission_escalation: true
  config_overrides:
  - 'mcp_servers.ea.command="python3"'
  - 'mcp_servers.ea.args=["/docker/fleet/scripts/ea_mcp_bridge.py"]'
  - 'mcp_servers.ea.env_vars=["EA_MCP_BASE_URL","EA_MCP_API_TOKEN","EA_MCP_PRINCIPAL_ID","EA_MCP_TIMEOUT_SECONDS","EA_MCP_MODEL"]'
  - 'mcp_servers.ea.enabled_tools=["ea.list_skills","ea.get_skill","ea.compile_plan","ea.execute_plan","ea.execute_tool","ea.context_pack"]'
  - 'mcp_servers.ea.tool_timeout_sec=120'
  - 'mcp_servers.ea.required=false'
review:
  enabled: true
  mode: local
  trigger: local
  required_before_queue_advance: true
  focus_template: for design drift, ownership contradictions, and missing mirror guidance
  owner: ArchonMegalon
  repo: chummer6-design
  base_branch: main
  branch_template: fleet/design
  bot_logins:
  - codex
queue: []
queue_sources:
- kind: worklist
  path: WORKLIST.md
  mode: replace
