program_phases:
- id: A
  title: Design and contract canon
  status: complete
  goal: Make central design and package ownership trustworthy.
  milestones:
  - id: A0
    title: chummer6-design bootstrap complete
    owners:
    - chummer6-design
    status: complete
    exit:
    - Active repo list matches the live repo graph.
    - Media-factory is represented in ownership, milestones, blockers, sync, and project
      scope.
    - Canonical files are substantive, not placeholders.
    - Root-level orphan product docs are removed or relocated.
  - id: A1
    title: Engine contract canon
    owners:
    - chummer6-core
    - chummer6-design
    status: complete
    exit:
    - Chummer.Engine.Contracts is the sole canonical engine/shared contract package.
    - Engine runtime, explain, and reducer DTO families are owned once.
  - id: A2
    title: Play contract canon
    owners:
    - chummer6-hub
    - chummer6-mobile
    - chummer6-design
    status: complete
    exit:
    - Chummer.Play.Contracts has stable ownership and package naming.
    - Play consumes package-only seams, including hosted play API and replay/checkpoint DTOs.
    - No duplicated play/run session transport DTO families remain across hosted/mobile surfaces.
  - id: A3
    title: Run orchestration contract canon
    owners:
    - chummer6-hub
    - chummer6-design
    status: complete
    exit:
    - Chummer.Run.Contracts owns hosted orchestration DTOs only.
    - Media and registry execution contracts are no longer mixed into run orchestration
      families.
  - id: A4
    title: External tools plane canon
    owners:
    - chummer6-design
    - chummer6-hub
    - chummer6-media-factory
    status: complete
    exit:
    - External tools policy exists centrally.
    - All owned tools are classified by architectural role.
    - System-of-record rules are documented.
    - External integrations are assigned to owning repos.
- id: H
  title: Horizons and public capability canon
  status: complete
  release_blocking: false
  goal: Make future-capability posture canonical without expanding the current release critical path.
  milestones:
  - id: H0
    title: Horizon canon established
    owners:
    - chummer6-design
    status: complete
    exit:
    - "`HORIZONS.md` exists in the product front door."
    - Canonical horizon docs exist for promoted future lanes.
    - Future-capability posture no longer lives only in downstream public guide copy.
  - id: H1
    title: Public guide and horizon sync policy
    owners:
    - chummer6-design
    status: complete
    exit:
    - "`PUBLIC_GUIDE_POLICY.md` defines `Chummer6` as downstream-only."
    - The guide cannot outrun canonical horizon docs.
    - Public-facing repo posture is explicit in the front door.
  - id: H2
    title: LTD capability map complete
    owners:
    - chummer6-design
    - chummer6-hub
    - chummer6-media-factory
    status: complete
    exit:
    - Owned tools are mapped to promoted, bounded, parked, or non-product states.
    - Explicit owners exist for promoted and bounded product lanes.
    - "`EXTERNAL_TOOLS_PLANE.md` and `LTD_CAPABILITY_MAP.md` agree."
  - id: H3
    title: First bounded horizon promoted to research-ready
    owners:
    - chummer6-design
    - chummer6-hub
    - chummer6-media-factory
    status: complete
    exit:
    - At least one horizon has named owners, tool posture, and provenance constraints.
    - The horizon is ready for bounded research without widening release scope.
  - id: H4
    title: Public signal loop defined
    owners:
    - chummer6-design
    - chummer6-hub
    status: complete
    exit:
    - Public proposal lanes are explicit.
    - Advisory signal collection rules are documented.
    - "`MetaSurvey`, `ApproveThis`, and `Teable` posture is canonical."
  - id: H5
    title: Table coaching horizon defined
    owners:
    - chummer6-design
    - chummer6-hub
    - chummer6-media-factory
    status: complete
    exit:
    - "`TABLE PULSE` exists with explicit consent, privacy, and non-truth boundaries."
    - "`Nonverbia` posture is canonical across `HORIZON_REGISTRY.yaml`, `EXTERNAL_TOOLS_PLANE.md`, and `LTD_CAPABILITY_MAP.md`."
    - Post-session coaching outputs remain distinct from session truth, moderation truth, and player scoring.
- id: B
  title: Surface split completion
  status: complete
  goal: Finish the play/workbench/UI-kit boundary.
  milestones:
  - id: B0
    title: Play shell becomes real
    owners:
    - chummer6-mobile
    status: complete
    exit:
    - Real local ledger and sync client exist.
    - Player shell and GM shell reach first usable end-to-end flows.
    - Play mirror coverage exists under .codex-design.
  - id: B1
    title: UI kit becomes the real shared boundary
    owners:
    - chummer6-ui-kit
    - chummer6-ui
    - chummer6-mobile
    status: complete
    exit:
    - Shared tokens, primitives, shell chrome, and state patterns live in Chummer.Ui.Kit.
    - Presentation and play consume the package instead of duplicating shared UI.
  - id: B2
    title: Presentation purified to workbench/browser/desktop
    owners:
    - chummer6-ui
    status: complete
    exit:
    - No dedicated play/mobile hosts remain in presentation.
    - Presentation design docs and implementation scopes match the split reality.
- id: C
  title: Service extraction
  status: in_progress
  goal: Isolate registry and media into dedicated repos and shrink run-services.
  milestones:
  - id: C0
    title: Hub registry extraction
    owners:
    - chummer6-hub-registry
    - chummer6-hub
    status: complete
    exit:
    - Artifact catalog, publication state, installs, reviews, and compatibility metadata
      live behind chummer6-hub-registry.
    - Run-services consumes registry contracts instead of owning registry persistence
      internals.
  - id: C1
    title: Media factory extraction
    owners:
    - chummer6-media-factory
    - chummer6-hub
    status: complete
    exit:
    - Chummer.Media.Contracts is canonical.
    - Media render execution leaves run-services.
    - Media-factory has source, mirrors, milestones, and integration coverage.
  - id: C1b
    title: Orchestration-side external adapters
    owners:
    - chummer6-hub
    status: open
    exit:
    - Approval, docs/help, survey, research, and automation bridges are adapter-based.
    - Provider routes emit Chummer receipts.
    - No client repo owns third-party provider access.
  - id: C1c
    title: Media-side external adapters
    owners:
    - chummer6-media-factory
    status: open
    exit:
    - Document, preview, route, video, and archive adapters exist behind media-factory.
    - Media provenance is captured in manifests.
    - Provider choice remains switchable and kill-switchable.
  - id: C2
    title: Run-services shrink
    owners:
    - chummer6-hub
    status: complete
    exit:
    - Registry persistence and media render internals are no longer hosted here.
    - Run-services reads as an orchestrator, not a hidden super-repo.
- id: D
