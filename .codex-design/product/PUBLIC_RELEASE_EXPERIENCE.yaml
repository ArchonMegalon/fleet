release_notes_summary: The current preview centers one obvious installer, a visible proof trail, cleaner account handoff, and account-aware install linking without changing the signed artifact.
desktop_flagship_head: Chummer.Avalonia
desktop_fallback_head: Chummer.Blazor.Desktop
desktop_cut_summary: The current desktop wave treats Avalonia as the flagship native preview head, keeps Blazor Desktop as the bounded compatibility fallback, and distinguishes recommended installer posture from portable fallback posture.
