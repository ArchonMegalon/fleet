id: fleet
lifecycle: live
dispatch_priority: 260
path: /docker/fleet
design_doc: /docker/fleet/README.md
verify_cmd: python3 scripts/check_consistency.py && python3 -m py_compile controller/app.py admin/app.py studio/app.py auditor/app.py scripts/fleet_codex_nonstop.py
feedback_dir: feedback
state_file: .agent-state.json
enabled: true
accounts:
- acct-ea-fleet
- acct-ea-groundwork
account_policy:
  preferred_accounts:
  - acct-ea-fleet
  burst_accounts: []
  reserve_accounts:
  - acct-ea-repair
  - acct-ea-groundwork
  - acct-ea-review-light
  - acct-ea-jury
  - acct-ea-core
  - acct-ea-survival
  allow_chatgpt_accounts: false
  allow_api_accounts: true
  spark_enabled: false
runner:
  sandbox: danger-full-access
  approval_policy: never
  exec_timeout_seconds: 5400
  exec_idle_timeout_seconds: 360
  restart_cooldown_seconds: 5
  exec_stalled_account_backoff_threshold: 2
  exec_stalled_account_backoff_seconds: 5
  verify_timeout_seconds: 1200
  always_continue: true
  avoid_permission_escalation: true
  runtime_model: ea-groundwork-gemini
  config_overrides:
  - 'model_provider="ea"'
  - 'model_providers.ea.name="Executive Assistant"'
  - 'model_providers.ea.base_url="http://host.docker.internal:8090/v1"'
  - 'model_providers.ea.wire_api="responses"'
  - 'model_providers.ea.http_headers={"X-EA-Principal-ID"="codex-fleet"}'
  - 'model_providers.ea.stream_idle_timeout_ms=300000'
  - 'model_providers.ea.stream_max_retries=1'
review:
  enabled: true
  mode: local
  trigger: local
  required_before_queue_advance: true
  focus_template: ""
  owner: ArchonMegalon
  repo: fleet
  base_branch: main
  branch_template: main
  bot_logins:
  - codex
workflow:
  kind: groundwork_review_loop
  max_review_rounds: 3
  first_review_required: true
  jury_acceptance_required: true
  core_rescue_after_round: 0
queue:
-
  title: persist survival lane queue state and cache state in durable storage instead of process-local memory
  difficulty: hard
  risk_level: high
  workflow_kind: groundwork_review_loop
  branch_policy: feature_branch
  allowed_lanes: [groundwork, easy]
  required_reviewer_lane: review_light
  final_reviewer_lane: jury
  landing_lane: jury
  acceptance_level: reviewed
  budget_class: cheap
  latency_class: normal
  max_review_rounds: 3
  first_review_required: true
  jury_acceptance_required: true
  allow_credit_burn: false
  allow_paid_fast_lane: false
  allow_core_rescue: false
  core_rescue_after_round: 0
-
  title: surface lane, backend, brain, and capacity posture clearly in dashboard and admin views for active and recent workers
  difficulty: medium
  risk_level: low
  workflow_kind: groundwork_review_loop
  branch_policy: review_branch
  allowed_lanes: [groundwork, easy]
  required_reviewer_lane: review_light
  final_reviewer_lane: jury
  landing_lane: jury
