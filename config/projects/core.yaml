id: core
lifecycle: live
path: /docker/chummercomplete/chummer6-core
design_doc: /docker/chummercomplete/chummer-design/products/chummer/projects/core.md
verify_cmd: ./scripts/ai/verify.sh
feedback_dir: feedback
state_file: .agent-state.json
accounts:
- acct-core-a
- acct-studio-a
- acct-shared-b
- acct-chatgpt-core
- acct-chatgpt-b
- acct-chatgpt-archon
account_policy:
  preferred_accounts:
  - acct-chatgpt-archon
  - acct-chatgpt-core
  - acct-core-a
  burst_accounts:
  - acct-shared-b
  reserve_accounts:
  - acct-chatgpt-b
  - acct-studio-a
  allow_chatgpt_accounts: true
  allow_api_accounts: true
  spark_enabled: true
participant_burst:
  enabled: true
  max_active_workers: 1
  allow_chatgpt_accounts: true
  eligible_task_classes:
  - bounded_fix
  - multi_file_impl
  landing_lane: jury
  require_jury_before_land: true
  preferred_models:
  - gpt-5.4
  - gpt-5.3-codex
  credit_guard:
    enabled: true
    provider: onemin
    require_survive_until_next_topup: true
    minimum_headroom_hours: 0
  autoscale:
    enabled: true
    min_active_workers: 1
    max_active_workers: 3
    increase_when:
      sponsor_ready_lanes_gte: 1
      jury_oldest_wait_seconds_lt: 1800
      premium_queue_depth_gte: 1
    decrease_when:
      jury_oldest_wait_seconds_gt: 3600
      jury_queue_depth_gt: 2
      premium_queue_depth_eq: 0
  modes:
    normal:
      premium_first: false
    surge:
      premium_first: true
      eligible_task_classes:
      - bounded_fix
      - multi_file_impl
booster_pool_contract:
  pool: core_booster
  authority_lane: core_authority
  booster_lane: core_booster
  rescue_lane: core_rescue
  review_fabric: default
  audit_fabric: default
  project_safety_cap: 3
runner:
  sandbox: danger-full-access
  approval_policy: never
  exec_timeout_seconds: 5400
  verify_timeout_seconds: 1800
  always_continue: true
  avoid_permission_escalation: true
  config_overrides:
  - 'mcp_servers.ea.command="python3"'
  - 'mcp_servers.ea.args=["/docker/fleet/scripts/ea_mcp_bridge.py"]'
  - 'mcp_servers.ea.env_vars=["EA_MCP_BASE_URL","EA_MCP_API_TOKEN","EA_MCP_PRINCIPAL_ID","EA_MCP_TIMEOUT_SECONDS","EA_MCP_MODEL"]'
  - 'mcp_servers.ea.enabled_tools=["ea.list_skills","ea.get_skill","ea.compile_plan","ea.execute_plan","ea.execute_tool","ea.context_pack"]'
  - 'mcp_servers.ea.tool_timeout_sec=120'
  - 'mcp_servers.ea.required=false'
review:
  enabled: true
  mode: github
  trigger: manual_comment
  fallback_mode: local
  fallback_conditions: degraded_or_stalled
  required_before_queue_advance: true
  focus_template: for regressions, missing tests, and contract drift
  owner: ArchonMegalon
  repo: chummer6-core
  base_branch: main
  branch_template: fleet/core
  bot_logins:
  - codex
queue: []
enabled: true
queue_sources:
- kind: worklist
  path: WORKLIST.md
  mode: replace
- kind: next90_queue_staging
  path: /docker/fleet/.codex-studio/published/NEXT_90_DAY_QUEUE_STAGING.generated.yaml
  mode: append
  repos:
  - chummer6-core
