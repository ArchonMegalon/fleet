product: chummer
version: 1
last_reviewed: 2026-04-04
scope:
  legacy_clients:
    - name: Chummer5a
      source: local_repo
    - name: Chummer4
      source: oracle_only
      note: No local repo mirror is present in this workspace; SR4 parity still uses Chummer4 as the stronger workflow oracle where canon says it should.
  adjacent_clients:
    - name: Genesis / CommLink6
      source: public_docs
      urls:
        - https://www.rpgframework.de/en/roleplaying/shadowrun-6/
        - https://rpgframework.atlassian.net/wiki/spaces/COM6/pages/2031714315/Commlink%2Bvs.%2BGenesis
    - name: Hero Lab Classic
      source: public_docs
      urls:
        - https://www.wolflair.com/hero-lab-classic/
  excluded:
    - plugin-framework
policy:
  modernization_rule:
    - Modern successors may consolidate or improve legacy forms when the same user job stays first-class, faster, and more explainable.
    - No in-scope feature family may be stranded behind a missing action, support-only workaround, or operator ritual.
