id: ui-kit
path: /docker/chummercomplete/chummer-ui-kit
design_doc: /docker/chummercomplete/chummer-ui-kit/docs/chummer-ui-kit.design.v1.md
verify_cmd: bash scripts/ai/verify.sh
feedback_dir: feedback
state_file: .agent-state.json
enabled: true
accounts:
- acct-ui-a
- acct-shared-b
- acct-studio-a
- acct-chatgpt-b
account_policy:
  preferred_accounts:
  - acct-ui-a
  burst_accounts:
  - acct-shared-b
  reserve_accounts:
  - acct-chatgpt-b
  - acct-studio-a
  allow_chatgpt_accounts: true
  allow_api_accounts: true
  spark_enabled: true
runner:
  sandbox: workspace-write
  approval_policy: never
  exec_timeout_seconds: 5400
  verify_timeout_seconds: 1800
  always_continue: true
  avoid_permission_escalation: true
  config_overrides: []
review:
  enabled: true
  mode: github
  trigger: manual_comment
  required_before_queue_advance: true
  focus_template: for visual regressions, accessibility regressions, and missing tests
  owner: ArchonMegalon
  repo: chummer-ui-kit
  base_branch: main
  branch_template: fleet/ui-kit
  bot_logins:
  - codex
queue:
- Seed Chummer.Ui.Kit with token canon, theme compilation, and preview/gallery ownership without any domain DTOs or HTTP clients.
- Extract shell chrome, banners, stale-state badges, approval chips, offline banners, and accessibility/state primitives into Blazor and Avalonia UI-kit adapters.
- Migrate presentation and play to consume Chummer.Ui.Kit as a package-only dependency and delete duplicate local token/theme/component copies.
queue_sources: []
