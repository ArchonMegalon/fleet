id: guide
lifecycle: signoff_only
path: /docker/chummercomplete/Chummer6
design_doc: /docker/chummercomplete/chummer-design/products/chummer/projects/guide.md
verify_cmd: python3 /docker/fleet/scripts/verify_chummer6_guide_surface.py
feedback_dir: UPDATES
state_file: .agent-state.json
enabled: true
accounts:
- acct-studio-a
- acct-shared-b
runner:
  sandbox: danger-full-access
  approval_policy: never
  exec_timeout_seconds: 1800
  verify_timeout_seconds: 300
  always_continue: true
  avoid_permission_escalation: true
  config_overrides:
  - 'mcp_servers.ea.command="python3"'
  - 'mcp_servers.ea.args=["/docker/fleet/scripts/ea_mcp_bridge.py"]'
  - 'mcp_servers.ea.env_vars=["EA_MCP_BASE_URL","EA_MCP_API_TOKEN","EA_MCP_PRINCIPAL_ID","EA_MCP_TIMEOUT_SECONDS","EA_MCP_MODEL"]'
  - 'mcp_servers.ea.enabled_tools=["ea.list_skills","ea.get_skill","ea.compile_plan","ea.execute_plan","ea.execute_tool","ea.context_pack"]'
  - 'mcp_servers.ea.tool_timeout_sec=120'
  - 'mcp_servers.ea.required=false'
review:
  enabled: false
  mode: local
  trigger: local
  required_before_queue_advance: false
  focus_template: ""
  owner: ArchonMegalon
  repo: Chummer6
  base_branch: main
  branch_template: main
  bot_logins:
  - codex
queue: []
queue_sources: []
