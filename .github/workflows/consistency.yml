name: Fleet Consistency

on:
  pull_request:
    paths:
      - ".gitignore"
      - "README.md"
      - "FLEET_ADMIN_SPEC.md"
      - "admin/**"
      - "controller/**"
      - "config/**"
      - "scripts/check_consistency.py"
      - "scripts/verify_public_repo_hygiene.py"
      - "tests/test_verify_public_repo_hygiene.py"
      - "deploy-fleet.sh"
      - "runtime.ea.env.example"
  push:
    branches:
      - main
    paths:
      - ".gitignore"
      - "README.md"
      - "FLEET_ADMIN_SPEC.md"
      - "admin/**"
      - "controller/**"
      - "config/**"
      - "scripts/check_consistency.py"
      - "scripts/verify_public_repo_hygiene.py"
      - "tests/test_verify_public_repo_hygiene.py"
      - "deploy-fleet.sh"
      - "runtime.ea.env.example"

jobs:
  consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install check dependency
        run: python3 -m pip install --disable-pip-version-check pyyaml

      - name: Run fleet consistency guard
        run: python3 scripts/check_consistency.py

      - name: Run public repo hygiene guard
        run: python3 scripts/verify_public_repo_hygiene.py
