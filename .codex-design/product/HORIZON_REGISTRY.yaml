- id: karma-forge
  title: KARMA FORGE
  status: horizon
  family: governed_rules_evolution
  canon_doc: products/chummer/horizons/karma-forge.md
  public_guide:
    enabled: true
    order: 30
  pain_label: I want house rules without fork chaos.
  wow_promise: Tables can evolve governed rulesets without splintering into unreadable forks.
  table_scene: A GM promotes a house-rule pack with visible impact, approval history, and reversible publication state.
  build_path:
    intent: eventual_product_lane
    current_state: horizon
    next_state: bounded_research
  owning_repos:
  - chummer6-core
  - chummer6-hub
  - chummer6-hub-registry
  milestone_family: H3
  release_blocking: false
  foundations:
  - A1
  - A2
  - C0
  - D2
  tool_posture:
    promoted:
    - Prompting Systems
    - MetaSurvey
    - ApproveThis
    bounded:
    - AI Magicx
  success_signals:
  - Rule-pack proposals carry receipts and approval state.
  - Published alternates do not fork canonical mechanics ownership.
  artifact_types:
  - rule-pack diff
  - approval packet
  - compatibility projection
  public_signal_eligible: true
  access_posture: booster_first
  resource_burden: high
  booster_nudge: Governed rules evolution burns approval, compatibility, and rollback effort, so early support may stay booster-first while the lane is still expensive to operate safely.
  free_later_intent: Long-run intent is broad access after approval, compatibility, and rollback costs stop making the lane unusually expensive to operate safely.
  recognition_eligible: true
  owner_handoff_gate: Rule evolution must route through governed packages, approvals, and compatibility metadata before promotion.
