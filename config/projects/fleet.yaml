id: fleet
lifecycle: live
dispatch_priority: 260
path: /docker/fleet
design_doc: /docker/fleet/README.md
verify_cmd: python3 scripts/check_consistency.py && python3 scripts/materialize_fleet_queue_overlay.py --repo-root /docker/fleet --project-id fleet && python3 scripts/materialize_package_compile_overlay.py --repo-root /docker/fleet --project-id fleet && python3 scripts/materialize_support_case_packets.py --out .codex-studio/published/SUPPORT_CASE_PACKETS.generated.json && python3 scripts/materialize_public_progress_report.py --out .codex-studio/published/PROGRESS_REPORT.generated.json --history-out .codex-studio/published/PROGRESS_HISTORY.generated.json && python3 scripts/materialize_status_plane.py --status-json-out state/status-plane.verify.json && python3 scripts/verify_status_plane_semantics.py --status-plane .codex-studio/published/STATUS_PLANE.generated.yaml --status-json state/status-plane.verify.json && python3 scripts/materialize_journey_gates.py --out .codex-studio/published/JOURNEY_GATES.generated.json --status-plane .codex-studio/published/STATUS_PLANE.generated.yaml --progress-report .codex-studio/published/PROGRESS_REPORT.generated.json --progress-history .codex-studio/published/PROGRESS_HISTORY.generated.json --support-packets .codex-studio/published/SUPPORT_CASE_PACKETS.generated.json && python3 scripts/materialize_flagship_product_readiness.py --out .codex-studio/published/FLAGSHIP_PRODUCT_READINESS.generated.json --mirror-out .codex-design/product/FLAGSHIP_PRODUCT_READINESS.generated.json && python3 -m py_compile controller/app.py admin/app.py studio/app.py auditor/app.py quartermaster/app.py scripts/fleet_codex_nonstop.py admin/studio_views.py scripts/materialize_support_case_packets.py scripts/materialize_fleet_queue_overlay.py scripts/materialize_package_compile_overlay.py scripts/materialize_journey_gates.py scripts/materialize_public_progress_report.py scripts/materialize_flagship_product_readiness.py && python3 -m pytest -q tests/test_studio_publish_contract.py tests/test_materialize_support_case_packets.py tests/test_materialize_fleet_queue_overlay.py tests/test_published_queue_overlay.py tests/test_published_work_package_contracts.py tests/test_materialize_compile_manifest.py::test_published_compile_manifest_matches_generated_payload tests/test_materialize_package_compile_overlay.py tests/test_public_progress_report.py tests/test_design_mirror_product_contracts.py tests/test_admin_studio.py tests/test_capacity_plane.py tests/test_quartermaster_service.py tests/test_quartermaster_ooda_e2e.py tests/test_work_package_collision_regressions.py tests/test_materialize_status_plane.py tests/test_materialize_public_progress_report.py tests/test_readiness_taxonomy.py tests/test_controller_routing.py tests/test_runtime_autoheal_contracts.py tests/test_rebuild_loop_autoheal_e2e.py
feedback_dir: feedback
state_file: .agent-state.json
enabled: true
accounts:
- acct-ea-groundwork
- acct-ea-groundwork-2
- acct-ea-fleet
- acct-ea-core
- acct-ea-core-01
- acct-ea-core-02
- acct-ea-core-03
- acct-ea-core-04
- acct-ea-core-05
- acct-ea-core-06
- acct-ea-core-07
- acct-ea-core-08
- acct-ea-core-09
- acct-ea-core-10
- acct-ea-core-11
- acct-ea-core-12
- acct-ea-core-13
account_policy:
  preferred_accounts:
  - acct-ea-core
  - acct-ea-core-01
  - acct-ea-core-02
  - acct-ea-core-03
  - acct-ea-core-04
  - acct-ea-core-05
  - acct-ea-core-06
  - acct-ea-core-07
  - acct-ea-core-08
  - acct-ea-core-09
  - acct-ea-core-10
  - acct-ea-core-11
  - acct-ea-core-12
  - acct-ea-core-13
  - acct-ea-groundwork
  - acct-ea-fleet
  burst_accounts:
  - acct-ea-groundwork-2
  reserve_accounts:
  - acct-ea-repair
  - acct-ea-review-light
  - acct-ea-jury
  - acct-ea-survival
  emergency_chatgpt_fallback_accounts:
  - acct-chatgpt-archon
  allow_chatgpt_accounts: false
  allow_api_accounts: true
  spark_enabled: false
booster_pool_contract:
  pool: core_booster
  authority_lane: core_authority
  booster_lane: core_booster
  rescue_lane: core_rescue
  review_fabric: default
  audit_fabric: default
  project_safety_cap: 20
queue_task_defaults:
  allowed_lanes:
  - core_booster
  allow_credit_burn: true
  allow_paid_fast_lane: false
  premium_required: true
worker_topology:
  groundwork_primary: acct-ea-groundwork
  groundwork_shadow: acct-ea-groundwork-2
  easy_primary: acct-ea-fleet
  core_primary: acct-ea-core
  jury_reviewer: acct-ea-jury
  core_rescue: acct-ea-core
runner:
  sandbox: danger-full-access
  approval_policy: never
  exec_timeout_seconds: 5400
  exec_idle_timeout_seconds: 360
  restart_cooldown_seconds: 5
  exec_stalled_account_backoff_threshold: 2
  exec_stalled_account_backoff_seconds: 5
  verify_timeout_seconds: 1200
  always_continue: true
  avoid_permission_escalation: true
  runtime_model: ea-groundwork-gemini
review:
  enabled: true
  mode: local
  trigger: local
  required_before_queue_advance: true
  focus_template: ""
  owner: ArchonMegalon
  repo: fleet
  base_branch: main
  branch_template: main
  bot_logins:
  - codex
  preferred_accounts:
  - acct-ea-jury
workflow:
  kind: groundwork_review_loop
  max_review_rounds: 3
  first_review_required: true
  jury_acceptance_required: true
  core_rescue_after_round: 0
queue:
- package_id: fleet-postclient-trust-status
  title: Make fleet trust and status publication strictly live-truth so stale aggregate snapshots, poisoned completion receipts, and misleading ETA/currentness states cannot survive into post-client operations.
  package_kind: implementation
  design_owner: fleet-platform
  architecture_sensitive: true
  premium_required: true
  allow_credit_burn: true
  allowed_lanes:
  - core_booster
- package_id: fleet-postclient-project-config-extraction
  title: Extract Chummer-specific shard topology, focus heuristics, proof paths, and owner-group routing out of launcher logic into explicit project configuration contracts.
  package_kind: implementation
  design_owner: fleet-platform
  architecture_sensitive: true
  premium_required: true
  allow_credit_burn: true
  allowed_lanes:
  - core_booster
  dependencies:
  - fleet-postclient-trust-status
- package_id: fleet-postclient-operating-profiles
  title: Add steady-state fleet operating profiles (`maintenance`, `standard`, `burst`) with explicit shard caps, resource budgets, and safe promotion-demotion rules.
  package_kind: implementation
  design_owner: fleet-platform
  architecture_sensitive: true
  premium_required: true
  allow_credit_burn: true
  allowed_lanes:
  - core_booster
  dependencies:
  - fleet-postclient-trust-status
- package_id: fleet-postclient-proof-orchestration
  title: Promote executable gates, parity proofs, and flagship-readiness materializers into first-class orchestrated jobs with freshness windows, retries, and dependency edges.
  package_kind: implementation
  design_owner: fleet-platform
  architecture_sensitive: true
  premium_required: true
  allow_credit_burn: true
  allowed_lanes:
  - core_booster
  dependencies:
  - fleet-postclient-project-config-extraction
- package_id: fleet-postclient-operator-surface
  title: Build a compact operator surface for shard mix, queue health, proof freshness, account health, resource pressure, and blocked milestones.
  package_kind: implementation
  design_owner: fleet-operator-loop
  architecture_sensitive: false
  premium_required: true
  allow_credit_burn: true
  allowed_lanes:
  - core_booster
  dependencies:
  - fleet-postclient-trust-status
- package_id: fleet-postclient-restart-safe-config
  title: Consolidate restart-safe fleet runtime configuration and validate reboot recovery behavior so policy survives supervisor restarts and host reboots without tribal knowledge.
  package_kind: implementation
  design_owner: fleet-platform
  architecture_sensitive: true
  premium_required: true
  allow_credit_burn: true
  allowed_lanes:
  - core_booster
  dependencies:
  - fleet-postclient-project-config-extraction
  - fleet-postclient-operating-profiles
queue_sources:
- kind: worklist
  path: WORKLIST.md
  mode: replace
  fallback_only_if_empty: true
