policies:
  max_parallel_runs: 2
  scheduler_interval_seconds: 15
  auditor_interval_seconds: 120
  stale_heartbeat_seconds: 1800
  restart_cooldown_seconds: 120
  feedback_cooldown_seconds: 600
  rate_limit_backoff_base: 60
  max_consecutive_failures: 3
  exec_timeout_seconds: 5400
  verify_timeout_seconds: 1800
  auto_heal_enabled: true
  review_stall_sla_minutes: 10
  auto_approve_finding_keys:
  - project.uncovered_scope
  - project.queue_exhausted_with_uncovered_scope
  - project.milestone_coverage_incomplete
spider:
  token_alliance_window_hours: 24
  classification_mode: heuristic_v2
  escalate_to_complex_after_failures: 2
  feedback_file_window: 2
  price_table:
    gpt-5.4:
      input: 2.5
      cached_input: 0.25
      output: 15.0
    gpt-5-mini:
      input: 0.25
      cached_input: 0.025
      output: 2.0
    gpt-5-nano:
      input: 0.05
      cached_input: 0.005
      output: 0.4
    gpt-5.3-codex:
      input: 1.75
      cached_input: 0.175
      output: 14.0
    gpt-5.3-codex-spark:
      input: 0.0
      cached_input: 0.0
      output: 0.0
  tier_preferences:
    inspect:
      models:
      - gpt-5-nano
      - gpt-5-mini
      - gpt-5.4
      reasoning_effort: none
      estimated_output_tokens: 384
    draft:
      models:
      - gpt-5-mini
      - gpt-5.4
      reasoning_effort: low
      estimated_output_tokens: 768
    micro_edit:
      models:
      - gpt-5.3-codex-spark
      - gpt-5-mini
      - gpt-5.4
      reasoning_effort: none
      estimated_output_tokens: 768
    bounded_fix:
      models:
      - gpt-5.3-codex-spark
      - gpt-5-mini
      - gpt-5.4
      reasoning_effort: low
      estimated_output_tokens: 1536
    multi_file_impl:
      models:
      - gpt-5.4
      - gpt-5.3-codex
      reasoning_effort: low
      estimated_output_tokens: 2048
    cross_repo_contract:
      models:
      - gpt-5.4
      - gpt-5.3-codex
      reasoning_effort: medium
      estimated_output_tokens: 4096
studio:
  max_parallel_runs: 1
  default_accounts:
  - acct-studio-a
  - acct-shared-b
  session_message_window: 8
  publish_feedback_note: true
  roles:
    designer:
      models:
      - gpt-5.4
      - gpt-5-mini
      reasoning_effort: medium
      sandbox: read-only
      approval_policy: never
      exec_timeout_seconds: 1800
    project_manager:
      models:
      - gpt-5-mini
      - gpt-5.4
      reasoning_effort: low
      sandbox: read-only
      approval_policy: never
      exec_timeout_seconds: 1500
    architect:
      models:
      - gpt-5.4
      - gpt-5-mini
      reasoning_effort: medium
      sandbox: read-only
      approval_policy: never
      exec_timeout_seconds: 1800
    program_manager:
      models:
      - gpt-5.4
      - gpt-5-mini
      reasoning_effort: medium
      sandbox: read-only
      approval_policy: never
      exec_timeout_seconds: 1800
    contract_steward:
      models:
      - gpt-5.4
      - gpt-5-mini
      reasoning_effort: medium
      sandbox: read-only
      approval_policy: never
      exec_timeout_seconds: 1800
    auditor:
      models:
      - gpt-5.4
      - gpt-5-mini
      reasoning_effort: medium
      sandbox: read-only
      approval_policy: never
      exec_timeout_seconds: 1800
    healer:
      models:
      - gpt-5.4
      - gpt-5-mini
      reasoning_effort: medium
      sandbox: read-only
      approval_policy: never
      exec_timeout_seconds: 1800
project_groups:
  - id: chummer-vnext
    projects:
      - core
      - ui
      - hub
      - mobile
      - ui-kit
      - hub-registry
      - design
    mode: lockstep
    captain:
      priority: 200
      service_floor: 1
      shed_order: 10
      preemption_policy: slice_boundary
      admission_policy: reserve
    contract_sets:
      - session_events_vnext
      - runtime_dtos_vnext
      - explain_trace_vnext
      - asset_review_vnext
    milestone_source:
      kind: group_milestones
      path: program_milestones.yaml
    group_roles:
      - program_manager
      - contract_steward
      - auditor
      - healer
projects:
- id: core
  path: /docker/chummercomplete/chummer-core-engine
  design_doc: /docker/chummercomplete/chummer-core-engine.design.v2.md
  verify_cmd: ./scripts/ai/verify.sh
  feedback_dir: feedback
  state_file: .agent-state.json
  accounts:
  - acct-core-a
  - acct-studio-a
  - acct-shared-b
  - acct-chatgpt-core
  - acct-chatgpt-b
  account_policy:
    preferred_accounts:
    - acct-core-a
    - acct-chatgpt-core
    burst_accounts:
    - acct-shared-b
    reserve_accounts:
    - acct-chatgpt-b
    - acct-studio-a
    allow_chatgpt_accounts: true
    allow_api_accounts: true
    spark_enabled: true
  runner:
    sandbox: workspace-write
    approval_policy: never
    exec_timeout_seconds: 5400
    verify_timeout_seconds: 1800
    always_continue: true
    avoid_permission_escalation: true
    config_overrides: []
  review:
    enabled: true
    mode: github
    trigger: manual_comment
    required_before_queue_advance: true
    focus_template: for regressions, missing tests, and contract drift
    owner: ArchonMegalon
    repo: chummer-core-engine
    base_branch: main
    branch_template: fleet/core
    bot_logins:
    - codex
  queue:
  - Isolation and compile recovery
  - Contract hardening
  - Structured Explain API hardening
  - Runtime/RulePack determinism hardening
  - Backend primitives for Build Lab / ledger / timeline / validation / explain hooks
  enabled: true
  queue_sources: []
