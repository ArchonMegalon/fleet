id: media-factory
lifecycle: scaffold
path: /docker/fleet/repos/chummer-media-factory
design_doc: /docker/fleet/repos/chummer-media-factory/docs/chummer-media-factory.design.v1.md
verify_cmd: bash scripts/ai/verify.sh
feedback_dir: feedback
state_file: .agent-state.json
enabled: true
accounts:
- acct-hub-a
- acct-shared-b
- acct-studio-a
- acct-chatgpt-b
account_policy:
  preferred_accounts:
  - acct-chatgpt-b
  - acct-hub-a
  burst_accounts:
  - acct-shared-b
  reserve_accounts:
  - acct-studio-a
  allow_chatgpt_accounts: true
  allow_api_accounts: true
  spark_enabled: true
runner:
  sandbox: workspace-write
  approval_policy: never
  exec_timeout_seconds: 5400
  verify_timeout_seconds: 1800
  always_continue: true
  avoid_permission_escalation: true
  config_overrides: []
review:
  enabled: true
  mode: github
  trigger: manual_comment
  required_before_queue_advance: true
  focus_template: for render-only contract boundaries, lifecycle regressions, and missing tests
  owner: ArchonMegalon
  repo: chummer6-media-factory
  base_branch: main
  branch_template: fleet/media-factory
  bot_logins:
  - codex
queue: []
queue_sources:
- kind: worklist
  path: WORKLIST.md
  mode: replace
