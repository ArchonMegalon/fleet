supervisor_contract:
  schema_version: 1
  purpose: Keep Chummer-specific supervisor topology, focus routing, and proof paths in project config instead of launcher-only code or env folklore.
  scope_roots:
  - /docker/fleet
  - /docker/chummercomplete
  - /docker/fleet/repos
  - /docker/chummer5a
  - /docker/EA
  runtime_policy:
    source_of_record: config/projects/fleet.yaml
    restart_safe: true
    state_root: /docker/fleet/state/chummer_design_supervisor
    clear_lock_on_boot: true
    health_max_age_seconds: 900
    shard_count: 14
    shard_start_stagger_seconds: 3
    frontier_derive_mode: auto
    dynamic_account_routing: auto
    prefer_full_ea_lanes: true
    pin_account_aliases: false
    worker_bin: /docker/fleet/scripts/codex-shims/codexea
    worker_lane: core
    worker_model: ea-coder-hard-batch
    fallback_lanes:
    - core_rescue
    fallback_models:
    - ea-coder-hard-batch
    - ea-coder-hard
    resource_policy:
      operating_profile: standard
      memory_dispatch_reserve_gib: 2
      memory_dispatch_shard_budget_gib: 0.28
      memory_dispatch_warning_available_percent: 10
      memory_dispatch_critical_available_percent: 6
      memory_dispatch_warning_swap_used_percent: 75
      memory_dispatch_critical_swap_used_percent: 90
      memory_dispatch_parked_poll_seconds: 300
      health_max_age_seconds: 900
    queue_posture:
      source: WORKLIST.md
      package_queue_source: config/projects/fleet.yaml
      active_package_statuses:
