product: chummer
version: 2
purpose: Canonical machine-readable horizon registry for downstream guide generation and future build alignment.
rules:
- Downstream generators must source horizon existence, order, and public eligibility from this file.
- Horizon docs in `products/chummer/horizons/*.md` remain the long-form human-readable canon.
- A horizon listed here is a future-capability lane, not a shipment promise.
- A horizon must define an eventual build path before it is treated as more than public storytelling.
optional_fields:
- family
- wow_promise
- table_scene
- success_signals
- artifact_types
- public_signal_eligible
- owner_handoff_gate
- access_posture
- resource_burden
- booster_nudge
- free_later_intent
- recognition_eligible
horizons:
- id: nexus-pan
  title: NEXUS-PAN
  status: horizon
  family: session_continuity
  canon_doc: products/chummer/horizons/nexus-pan.md
  public_guide:
    enabled: true
    order: 10
  pain_label: My devices drift and the table loses confidence.
  wow_promise: Shared state survives device churn without the table losing trust.
  table_scene: A player reconnects mid-session and catches up without the GM reconstructing state by memory.
  build_path:
    intent: eventual_product_lane
    current_state: horizon
    next_state: bounded_research
  owning_repos:
  - chummer6-core
  - chummer6-mobile
  - chummer6-hub
  milestone_family: H3
  release_blocking: false
  foundations:
  - D1
  - D2
  - B0
  tool_posture:
    promoted: []
    bounded: []
  success_signals:
  - Replay-safe reconnect is boringly reliable across devices.
  - Shared-state drift is observable and receipts are available when confidence breaks.
  artifact_types:
  - session continuity receipt
  - reconnect replay summary
  public_signal_eligible: true
  owner_handoff_gate: Session continuity proof must exist across core, mobile, and hub without second semantic families.
