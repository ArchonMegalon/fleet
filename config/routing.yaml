spider:
  token_alliance_window_hours: 24
  classification_mode: evidence_v1
  escalate_to_complex_after_failures: 2
  feedback_file_window: 2
  evidence_window_runs: 120
  evidence_min_sample: 6
  price_table:
    gpt-5.4:
      input: 2.5
      cached_input: 0.25
      output: 15.0
    gpt-5-mini:
      input: 0.25
      cached_input: 0.025
      output: 2.0
    gpt-5-nano:
      input: 0.05
      cached_input: 0.005
      output: 0.4
    gpt-5.3-codex:
      input: 1.75
      cached_input: 0.175
      output: 14.0
    gpt-5.3-codex-spark:
      input: 0.0
      cached_input: 0.0
      output: 0.0
  tier_preferences:
    inspect:
      models:
      - gpt-5-nano
      - gpt-5-mini
      - gpt-5.4
      reasoning_effort: none
      estimated_output_tokens: 384
    draft:
      models:
      - gpt-5-mini
      - gpt-5.4
      reasoning_effort: low
      estimated_output_tokens: 768
    micro_edit:
      models:
      - gpt-5.3-codex-spark
      - gpt-5-mini
      - gpt-5.4
      reasoning_effort: none
      estimated_output_tokens: 768
    bounded_fix:
      models:
      - gpt-5.3-codex-spark
      - gpt-5-mini
      - gpt-5.4
      reasoning_effort: low
      estimated_output_tokens: 1536
    multi_file_impl:
      models:
      - gpt-5.4
      - gpt-5.3-codex
      reasoning_effort: low
      estimated_output_tokens: 2048
    cross_repo_contract:
      models:
      - gpt-5.4
      - gpt-5.3-codex
      reasoning_effort: medium
      estimated_output_tokens: 4096

lanes:
  easy:
    label: EA Easy
    authority: run
    merge_protected_branches: false
    escalation_only: false
    worker_profile: easy
    codex_mode: easy
    runtime_model: ea-gemini-flash
    provider_hint_order: [gemini_vortex]
    reviewer_lane: core
    budget_bias: cheap
    latency_class: priority
  repair:
    label: EA Repair
    authority: run
    merge_protected_branches: false
    escalation_only: false
    worker_profile: repair
    codex_mode: easy
    runtime_model: ea-coder-fast
    provider_hint_order: [magixai, gemini_vortex]
    reviewer_lane: core
    budget_bias: cheap
    latency_class: normal
  core:
    label: EA Core
    authority: approve_merge
    merge_protected_branches: true
    escalation_only: false
    worker_profile: core
    codex_mode: core
    runtime_model: ea-coder-hard
    provider_hint_order: [onemin]
    reviewer_lane: core
    budget_bias: standard
    latency_class: normal
  jury:
    label: Jury
    authority: audit
    merge_protected_branches: false
    escalation_only: true
    async_only: true
    worker_profile: audit
    codex_mode: jury
    runtime_model: ea-audit-jury
    provider_hint_order: [chatplayground]
    reviewer_lane: core
    budget_bias: premium
    latency_class: batch
  survival:
    label: EA Survival
    authority: run
    merge_protected_branches: false
    escalation_only: true
    async_only: true
    worker_profile: survival
    codex_mode: survival
    runtime_model: ea-coder-survival
    provider_hint_order: [gemini_vortex, chatplayground]
    reviewer_lane: core
    budget_bias: cheap
    latency_class: batch
