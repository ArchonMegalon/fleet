events {}

http {
  server {
    listen 8090;
    server_name _;
    client_max_body_size 20m;

    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    location = /health {
      proxy_pass http://fleet-controller:8090/health;
    }

    location /api/studio/ {
      proxy_pass http://fleet-studio:8091/api/studio/;
    }

    location /studio/ {
      proxy_pass http://fleet-studio:8091/studio/;
    }

    location = /studio {
      proxy_pass http://fleet-studio:8091/studio;
    }

    location / {
      proxy_pass http://fleet-controller:8090/;
    }
  }
}
