services:
  fleet-controller:
    build:
      context: ./controller
      args:
        CODEX_NPM_REFRESH_TOKEN: ${CODEX_NPM_REFRESH_TOKEN:-static}
    env_file:
      - path: ./runtime.ea.env
        required: false
      - path: ./runtime.env
        required: false
    container_name: fleet-controller
    restart: unless-stopped
    init: true
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    environment:
      APP_PORT: 8090
      FLEET_CONFIG_PATH: /app/config/fleet.yaml
      FLEET_ACCOUNTS_PATH: /app/config/accounts.yaml
      FLEET_DB_PATH: /var/lib/codex-fleet/fleet.db
      FLEET_CONTROLLER_HEARTBEAT_PATH: /var/lib/codex-fleet/controller-heartbeat.json
      FLEET_CONTROLLER_HEARTBEAT_MAX_AGE_SECONDS: "45"
      FLEET_LOG_DIR: /var/lib/codex-fleet/logs
      FLEET_CODEX_HOME_ROOT: /var/lib/codex-fleet/codex-homes
      FLEET_GH_HOSTS_PATH: /run/gh/hosts.yml
      FLEET_QUARTERMASTER_BASE_URL: http://fleet-quartermaster:8094
      TZ: UTC
    volumes:
      - ./state:/var/lib/codex-fleet
      - ./config:/app/config:ro
      - ./secrets:/run/secrets:ro
      - ${HOME:-/home/tibor}/.config/gh:/run/gh:ro
      - ./:${FLEET_SELF_MOUNT_PATH:-/opt/codex-fleet}
      - /docker:/docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - fleet_net
    healthcheck:
      test: ["CMD-SHELL", "python /opt/codex-fleet/scripts/healthcheck_controller.py"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s

  fleet-studio:
    build:
      context: ./studio
      args:
        CODEX_NPM_REFRESH_TOKEN: ${CODEX_NPM_REFRESH_TOKEN:-static}
    env_file:
      - path: ./runtime.ea.env
        required: false
      - path: ./runtime.env
        required: false
    container_name: fleet-studio
    restart: unless-stopped
    init: true
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    environment:
      APP_PORT: 8091
      FLEET_CONFIG_PATH: /app/config/fleet.yaml
      FLEET_ACCOUNTS_PATH: /app/config/accounts.yaml
      FLEET_DB_PATH: /var/lib/codex-fleet/fleet.db
      FLEET_LOG_DIR: /var/lib/codex-fleet/studio-logs
      FLEET_CODEX_HOME_ROOT: /var/lib/codex-fleet/codex-homes
      FLEET_GH_HOSTS_PATH: /run/gh/hosts.yml
      TZ: UTC
    volumes:
      - ./state:/var/lib/codex-fleet
      - ./config:/app/config:ro
      - ./secrets:/run/secrets:ro
      - ${HOME:-/home/tibor}/.config/gh:/run/gh:ro
      - ./:${FLEET_SELF_MOUNT_PATH:-/opt/codex-fleet}
      - /docker:/docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - fleet_net
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8091/health', timeout=5)\nPY"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  fleet-admin:
    build:
      context: ./admin
    env_file:
      - path: ./runtime.ea.env
        required: false
      - path: ./runtime.env
        required: false
    container_name: fleet-admin
    restart: unless-stopped
    init: true
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    environment:
      APP_PORT: 8092
      FLEET_CONFIG_PATH: /app/config/fleet.yaml
      FLEET_ACCOUNTS_PATH: /app/config/accounts.yaml
      FLEET_DB_PATH: /var/lib/codex-fleet/fleet.db
      FLEET_CODEX_HOME_ROOT: /var/lib/codex-fleet/codex-homes
      FLEET_GH_HOSTS_PATH: /run/gh/hosts.yml
      CHUMMER_HUB_REGISTRY_BASE_URL: ${CHUMMER_HUB_REGISTRY_BASE_URL:-http://host.docker.internal:18091}
      CHUMMER_RELEASE_REGISTRY_CURRENT_URL: ${CHUMMER_RELEASE_REGISTRY_CURRENT_URL:-}
      TZ: UTC
    volumes:
      - ./state:/var/lib/codex-fleet
      - ./config:/app/config
      - ./secrets:/run/secrets:ro
      - ${HOME:-/home/tibor}/.config/gh:/run/gh:ro
      - ./:${FLEET_SELF_MOUNT_PATH:-/opt/codex-fleet}:ro
      - /docker:/docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - fleet_net
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8092/health', timeout=5)\nPY"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  fleet-auditor:
    build:
      context: ./auditor
    container_name: fleet-auditor
    restart: unless-stopped
    init: true
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    environment:
      APP_PORT: 8093
      FLEET_CONFIG_PATH: /app/config/fleet.yaml
      FLEET_DB_PATH: /var/lib/codex-fleet/fleet.db
      FLEET_STUDIO_SOURCE_PATH: /app/studio-src/app.py
      TZ: UTC
    volumes:
      - ./state:/var/lib/codex-fleet
      - ./config:/app/config:ro
      - ./studio:/app/studio-src:ro
      - ./:${FLEET_SELF_MOUNT_PATH:-/opt/codex-fleet}:ro
      - /docker:/docker:ro
    networks:
      - fleet_net
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8093/health', timeout=5)\nPY"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  fleet-quartermaster:
    build:
      context: ./quartermaster
    env_file:
      - path: ./runtime.ea.env
        required: false
      - path: ./runtime.env
        required: false
    container_name: fleet-quartermaster
    restart: unless-stopped
    init: true
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    environment:
      APP_PORT: 8094
      FLEET_CONFIG_PATH: /app/config/fleet.yaml
      FLEET_DB_PATH: /var/lib/codex-fleet/fleet.db
      FLEET_ADMIN_URL: http://fleet-admin:8092
      TZ: UTC
    volumes:
      - ./state:/var/lib/codex-fleet
      - ./config:/app/config:ro
      - ./:${FLEET_SELF_MOUNT_PATH:-/opt/codex-fleet}:ro
      - /docker:/docker:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - fleet_net
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8094/health', timeout=5)\nPY"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  fleet-dashboard:
    image: nginx:1.27-alpine
    container_name: fleet-dashboard
    restart: unless-stopped
    depends_on:
      - fleet-controller
      - fleet-studio
      - fleet-admin
      - fleet-auditor
      - fleet-quartermaster
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./gateway/static:/usr/share/nginx/html:ro
    ports:
      - 127.0.0.1:${HOST_DASHBOARD_PORT:-18090}:8090
    networks:
      - fleet_net
    healthcheck:
      test: ["CMD-SHELL", "wget -T 10 -q -O - http://127.0.0.1:8090/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 10s

  fleet-rebuilder:
    image: docker:28-cli
    container_name: fleet-rebuilder
    restart: unless-stopped
    init: true
    env_file:
      - path: ./runtime.ea.env
        required: false
      - path: ./runtime.env
        required: false
    environment:
      FLEET_REBUILD_COMPOSE_FILE: /workspace/docker-compose.yml
      FLEET_REBUILD_STATE_DIR: /workspace/state/rebuilder
      TZ: UTC
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace
    command: ["sh", "/workspace/scripts/rebuild-loop.sh"]
    networks:
      - fleet_net
    healthcheck:
      test: ["CMD-SHELL", "test -f /workspace/state/rebuilder/heartbeat.txt"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  fleet_net:
    name: ${FLEET_NETWORK_NAME:-codex-fleet-net}
    driver: bridge
