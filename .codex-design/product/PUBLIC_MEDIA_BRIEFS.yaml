product: chummer
surface: chummer.run
version: 2
style_epoch:
  mode: single_epoch_per_full_build
  comparison_between_builds: allowed
  note: A full landing build pass should share one major visual family, while later passes may intentionally compare different epochs.
render_rules:
  raster_only: true
  no_svg: true
  master_format: png
  required_derivatives:
    - avif
    - webp
  desktop_composition: 16:9
  mobile_safety_rule: keep_critical_action_inside_middle_60_percent
  no_readable_text: true
  no_logos: true
  no_provider_names: true
  no_ui_labels: true
  semantic_anchor_count_minimum: 3
shared_prompt_scaffold:
  applies_to: secondary_guide_art_only
  style_anchor: |
    grounded cyberpunk campaign scene art for secondary guide stills, Shadowrun-inspired tactical realism, visible metahuman physiology, obvious body-worn cyberware or patched chrome, diegetic AR anchored to real gear or anatomy, lived-in materials, visible dirt, bruising, stained bandages, vermin pressure, exhausted posture, and hard-used spaces, navy and graphite base palette, electric blue interface glow, warm amber proof lighting, subtle rain reflections, textured surfaces, layered physical props, high information density, product-specific semantics, no readable text, no logos
  negative_prompt: |
    readable text, letters, giant monogram, logo, watermark, central signboard, empty alley, empty boulevard, billboard centerpiece, sparse desk with one prop, lone brooding figure at vague wall, empty title-card pose with no scene logic, action-movie gun pose, anime, cel shading, cosplay look, over-saturated magenta neon, low-detail hands, distorted anatomy, fisheye lens, huge lens flare, floating nonsense UI clutter, stock-photo smile
critical_asset_style_epoch:
  mode: flagship_poster
  overrides_shared_prompt_scaffold: true
  style_anchor: |
    illustrated cover-grade promo poster for a cyberpunk-fantasy tabletop world, high-contrast painted realism, dramatic grouping, strong silhouette hierarchy, saturated but grounded color, visible grime, patched gear, old blood, clinic mess, rust bloom, mold, vermin hints, chrome-heavy metahuman street-life specificity, obvious cyberlimbs or body-worn augment hardware, diegetic AR added in post, neon and sodium-vapor contrast, dense practical props, unmistakably Shadowrun-adjacent runner life, scene-driven poster energy, not a clean cinematic screenshot, not a generic software landing still
  negative_prompt: |
    stock-photo realism, quiet editorial still, clean clinic, sterile exam room, generic sci-fi workshop, moody empty corridor, tasteful sparse composition, corporate lifestyle ad, one person in a dim room, paperwork meeting, tidy suburban medical office, bland near-future thriller vibe, clean software-campaign still
semantic_anchors:
  - dossier papers or briefing packet
  - six-sided dice
  - cyberware part or deck module
  - magical focus or reagent
  - route overlay or threat marker
  - integrity seal or evidence clip
  - commlink or data chip
  - reviewer, witness, or operator relationship
world_marker_minimum: 3
world_marker_bucket:
  - metahuman presence with readable tusks, pointed ears, horns, stature, dermal texture, or other nonhuman physiology
  - obvious cyberlimb, datajack, trodes, smartlink contacts, rig socket, or patched augment hardware
  - partial megacorp product lineage such as Ares, Aztechnology, Renraku, Shiawase, Saeder-Krupp, Horizon, Evo, or Wuxing gear cues with logos blurred or cropped
  - critter or parabotany ephemera such as devil rat traps, barghest or hell hound field photos, Blood Orchid plates, or Paper Lotus charms
  - magical focus, fetish, talisman, ward scar, or awakened-world hint
  - rain-soaked streets, sodium-vapor plus neon mix, or grimy utilitarian spaces
  - cables, duct tape, jury-rigged hardware, synthskin wrap, med patches, or off-brand med or corp gear
  - runner-life or shadow-community setting such as clinic, safehouse, van, alley, rooftop, market, back room, industrial rail, or matrix nook
  - social damage cues such as stained gauze, dried blood, bruises, infection tint, rat traps, mold bloom, cough syrup, spent stim patches, crash posture, or clinic waste
rules:
  - No provider names appear in public landing assets.
  - No LTD names appear in public landing assets.
  - PNG masters with AVIF and WebP derivatives are required for every public still.
  - No SVG files appear anywhere in the public front-door campaign set.
  - No empty placeholder frames are allowed.
  - Every placeholder card must still explain what is coming and why it matters.
  - Text in rendered images must be post-composited or otherwise verified instead of trusting raw model lettering.
  - A premium flagship poster or still hero is preferred over a mediocre teaser loop.
  - First-contact assets must feel information-rich, layered, and unmistakably product-specific rather than like quiet generic cyberpunk mood art.
  - Hero, index, and flagship horizon art must carry visible semantic anchors for what the product does; style alone is not enough.
  - The shared prompt scaffold is for secondary guide stills only; hero, horizons index, and flagship horizons should let the flagship poster epoch override it.
  - Poster energy is welcome on flagship assets when it still reads as a lived product scene instead of a title card or fashion pose.
  - Critical public assets must choose one overlay posture before compositing: none, ambient diegetic, smartlink tactical, medscan diagnostic, or forge review AR.
  - Overlay geometry on flagship art should prefer rails, brackets, spline traces, radial halos, and capsule chips over large face-covering rectangles.
  - Flagship assets should usually carry both a metahuman cue and a body-worn cyberware cue; rain and grime alone do not make the frame feel Shadowrun.
  - Lore crumbs should survive in flagship and quality-focus assets: cropped corp packaging, critter photo strips, talismonger ephemera, and parabotany prints are preferred over generic neon clutter.
  - The Sixth World should look expensive, dirty, and physically punishing: grime, vermin, sickness, old blood, crash fatigue, and damaged spaces are welcome when they stay scene-bound and believable.
  - Drug-use or vice cues should read as fallout, dependency, or hard living through spent inhalers, burned spoons, stim patches, crash kits, or shakes; never glamorize them as lifestyle beauty shots.
  - Gore should stay grounded and adult: dried blood, meat-glue residue, stained bandages, trauma cleanup, or ugly clinic aftermath are good; splatter spectacle and torture-porn are failures.
  - When a scene includes humor, keep it adult, peripheral, and diegetic through pictograms, mascot stickers, crossed-out icons, or cropped scribbles rather than readable joke signage.
  - Central signboards, empty roadway ambience, and low-density “one person plus one vague prop wall” compositions are failures on public guide/landing surfaces.
  - Calm isolated workstation energy is not enough for first contact; show relationships, pressure, and proof props.
  - Every generated frame must keep decisive action inside the safe center so one master can survive desktop and mobile crops.
contact_sheet_rejection:
  - giant letterform or centered signboard
  - empty neon boulevard
  - lone person at vague wall
  - sparse desk with one laptop and one mug
  - generic cyberpunk mood art with no dossier, dice, or proof semantics
  - text baked into the image
  - empty title-card posing with no product-scene storytelling
