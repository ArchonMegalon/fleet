id: mobile
lifecycle: dispatchable
path: /docker/chummercomplete/chummer-play
design_doc: /docker/chummercomplete/chummer-play/docs/chummer-play.design.v1.md
verify_cmd: bash scripts/ai/verify.sh
feedback_dir: feedback
state_file: .agent-state.json
accounts:
- acct-ui-a
- acct-studio-a
- acct-shared-b
- acct-chatgpt-core
- acct-core-a
- acct-ea-a
- acct-chatgpt-b
account_policy:
  preferred_accounts:
  - acct-chatgpt-b
  - acct-ui-a
  burst_accounts:
  - acct-shared-b
  reserve_accounts:
  - acct-chatgpt-core
  - acct-core-a
  - acct-ea-a
  - acct-studio-a
  allow_chatgpt_accounts: true
  allow_api_accounts: true
  spark_enabled: true
runner:
  sandbox: workspace-write
  approval_policy: never
  exec_timeout_seconds: 5400
  verify_timeout_seconds: 1800
  always_continue: true
  avoid_permission_escalation: true
  config_overrides: []
review:
  enabled: true
  mode: github
  trigger: manual_comment
  required_before_queue_advance: true
  focus_template: for offline sync, stale-state hazards, and missing tests
  owner: ArchonMegalon
  repo: chummer-play
  base_branch: main
  branch_template: fleet/mobile
  bot_logins:
  - codex
queue: []
queue_sources:
- kind: worklist
  path: WORKLIST.md
  mode: replace
deployment:
  status: stale_preview
  visibility: public
  surface: play shell preview
  target_url: https://chummer.run/session
  summary: Public session shell preview is live at /session/, but it still runs through the older portal-era public shape rather than a current promoted deployment.
enabled: true
