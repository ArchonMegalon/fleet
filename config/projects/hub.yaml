id: hub
path: /docker/chummercomplete/chummer.run-services
design_doc: /docker/chummercomplete/chummer-run-services.design.v2.md
verify_cmd: ./scripts/ai/verify.sh
feedback_dir: feedback
state_file: .agent-state.json
accounts:
- acct-hub-a
- acct-studio-a
- acct-shared-b
- acct-chatgpt-b
account_policy:
  preferred_accounts:
  - acct-hub-a
  burst_accounts:
  - acct-shared-b
  reserve_accounts:
  - acct-chatgpt-b
  - acct-studio-a
  allow_chatgpt_accounts: true
  allow_api_accounts: true
  spark_enabled: true
runner:
  sandbox: workspace-write
  approval_policy: never
  exec_timeout_seconds: 5400
  verify_timeout_seconds: 1800
  always_continue: true
  avoid_permission_escalation: true
  config_overrides: []
review:
  enabled: true
  mode: github
  trigger: manual_comment
  required_before_queue_advance: true
  focus_template: for contract drift, compatibility regressions, and session relay hazards
  owner: ArchonMegalon
  repo: chummer.run-services
  base_branch: main
  branch_template: fleet/hub
  bot_logins:
  - codex
queue: []
queue_sources:
- kind: worklist
  path: WORKLIST.md
  mode: replace
enabled: true
