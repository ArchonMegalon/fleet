product: chummer
surface: chummer5a_remaining_hard_parity
version: 1
last_reviewed: 2026-04-30
purpose: Machine-readable release-blocking matrix for the remaining hard Chummer5A human-parity families so gates and milestone tracking do not collapse them into generic desktop readiness.

audit_required_fields:
  - family_id
  - surface_id
  - dialog_id
  - element_id
  - element_label
  - present_in_chummer5a
  - present_in_chummer6
  - visual_parity
  - behavioral_parity
  - removable_if_not_in_chummer5a
  - reason

field_rules:
  present_in_chummer5a:
    allowed_values: [yes, no]
  present_in_chummer6:
    allowed_values: [yes, no]
  visual_parity:
    allowed_values: [yes, no]
  behavioral_parity:
    allowed_values: [yes, no]
  removable_if_not_in_chummer5a:
    allowed_values: [yes, no]

default_tester_policy:
  parity_default_for_real_legacy_job: yes
  modernization_allowed_if:
    - improves_density_without_hiding_state
    - improves_readability_without_adding_indirection
    - improves_continuity_without_slower_primary_route
    - preserves_trusted_completion_of_the_same_user_job
  modernization_fails_if:
    - buries_first_class_dialog_behind_dashboard_indirection
    - turns_dense_work_into_slower_ritual
    - hides_actionable_state_behind_review_or_overview_framing
    - makes_source_import_or_export_truth_harder_to_inspect
    - converts_direct_utility_into_sidecar_or_post_hoc_explain_only_surface
  chummer6_only_control_may_stay_if:
    - shortens_path_to_legacy_user_job
    - increases_trust_without_adding_indirection
    - improves_install_live_play_recap_or_return_continuity

families:
  - id: translator_xml_bridge
    release_blocking: true
    milestone_task_id: "136.21"
    required_screenshots:
      - translator_route_with_live_language_inventory
      - translator_route_with_selected_language_or_overlay_state
      - xml_amendment_route_with_editable_target
      - custom_data_bridge_with_enabled_overlay_posture
    surfaces:
      - id: translator_dialog
        must_remain_first_class:
          - translator_title
          - language_inventory
          - overlay_or_corpus_posture
          - search_or_filter
          - direct_bridge_handoff
      - id: xml_amendment_editor
        must_remain_first_class:
          - amendment_scope
          - file_or_overlay_target
          - change_visibility
          - save_apply_posture
      - id: custom_data_bridge
        must_remain_first_class:
          - explicit_custom_data_route
          - enabled_overlay_visibility
          - governed_or_stale_posture
          - translator_or_amendment_handoff

  - id: dense_builder_and_career
    release_blocking: true
    milestone_task_id: "136.22"
    required_screenshots:
