    top_flagship_grade:
      description: "Apply the hard flagship bar: whole-product frontier, no lowered standards, durable feedback/autofix readiness, and fail-closed desktop proof."
      owners: []
      texts: []
    whole_project_frontier:
      description: Treat the whole product as the active frontier instead of collapsing the bar to one head or one proof family.
      owners: []
      texts: []
    desktop_client:
      description: Prioritize desktop-client delivery across UI, core, rules, install, restore, and SR4-SR6 readiness.
      owners:
