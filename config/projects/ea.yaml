id: ea
lifecycle: live
path: /docker/EA
design_doc: /docker/EA/ARCHITECTURE_MAP.md
verify_cmd: bash scripts/verify_release_assets.sh
feedback_dir: feedback
state_file: .agent-state.json
accounts:
- acct-ea-a
- acct-studio-a
- acct-shared-b
- acct-chatgpt-b
- acct-chatgpt-archon
account_policy:
  preferred_accounts:
  - acct-chatgpt-archon
  - acct-ea-a
  burst_accounts:
  - acct-shared-b
  reserve_accounts:
  - acct-chatgpt-b
  - acct-studio-a
  allow_chatgpt_accounts: true
  allow_api_accounts: true
  spark_enabled: true
runner:
  sandbox: danger-full-access
  approval_policy: never
  exec_timeout_seconds: 5400
  verify_timeout_seconds: 1800
  always_continue: true
  avoid_permission_escalation: true
  config_overrides:
  - 'mcp_servers.ea.command="python3"'
  - 'mcp_servers.ea.args=["/docker/fleet/scripts/ea_mcp_bridge.py"]'
  - 'mcp_servers.ea.env_vars=["EA_MCP_BASE_URL","EA_MCP_API_TOKEN","EA_MCP_PRINCIPAL_ID","EA_MCP_TIMEOUT_SECONDS"]'
  - 'mcp_servers.ea.enabled_tools=["ea.list_skills","ea.get_skill","ea.compile_plan","ea.execute_plan","ea.execute_tool","ea.context_pack"]'
  - 'mcp_servers.ea.tool_timeout_sec=120'
  - 'mcp_servers.ea.required=false'
review:
  enabled: true
  mode: local
  trigger: local
  required_before_queue_advance: true
  focus_template: for regressions and missing tests
  owner: ArchonMegalon
  repo: executive-assistant
  base_branch: main
  branch_template: fleet/ea
  bot_logins:
  - codex
queue: []
queue_sources:
- kind: tasks_work_log
  path: TASKS_WORK_LOG.md
  mode: replace
- kind: milestone_capabilities
  path: MILESTONE.json
  mode: replace
  fallback_only_if_empty: true
  exclude_statuses:
  - released
  label_prefix: 'Promote milestone capability: '
enabled: true
