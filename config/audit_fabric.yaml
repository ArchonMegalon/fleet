audit_fabric:
  default:
    lane: audit_shard
    target_parallelism: 20
    service_floor: 10
    pre_audit:
      enabled: true
      source_lane: review_shard
      spare_workers_per_audit_equivalent: 2
    debt_backpressure:
      open_incidents_yellow: 8
      open_incidents_red: 16
      worker_no_progress_yellow: 2
    finding_types:
    - credit_runway_risk
    - onemin_credit_waste_risk
    - scope_contention
    - utilization_audit
    - output_audit
    - contract_audit
    - review_audit
    typed_findings:
    - credit_runway_risk
    - booster_idle
    - participant_pool_drainable
    - participant_pool_starved
    - participant_token_pool_invalid
    - participant_consent_missing
    - onemin_credit_waste_risk
    - scope_contention
    - review_backpressure
    - audit_debt
    - worker_no_progress
    - contract_drift
    - slot_probe_stale
