<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" fill="none">
  <defs>
    <linearGradient id="bg" x1="152" y1="84" x2="1611" y2="1089" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071018"/>
      <stop offset="0.42" stop-color="#0B1724"/>
      <stop offset="1" stop-color="#08111A"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(380 254) rotate(38.7345) scale(545.108 401.462)">
      <stop stop-color="#2ED8B3" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#2ED8B3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1432 228) rotate(137.87) scale(436.057 316.021)">
      <stop stop-color="#7FAFFF" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#7FAFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowC" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1112 798) rotate(106.671) scale(523.422 460.183)">
      <stop stop-color="#F3A95D" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#F3A95D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="copper" x1="202" y1="930" x2="1546" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3A95D" stop-opacity="0.12"/>
      <stop offset="0.5" stop-color="#F3A95D" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#89B6FF" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealLine" x1="294" y1="698" x2="1459" y2="284" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6BE0C1" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#6BE0C1" stop-opacity="1"/>
      <stop offset="1" stop-color="#89B6FF" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="nodeGlow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#6BE0C1"/>
      <stop offset="1" stop-color="#89B6FF"/>
    </linearGradient>
    <filter id="blur32" x="-120" y="-120" width="2040" height="1440" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0 0.035 0.05"/>
      </feComponentTransfer>
    </filter>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" stroke="white" stroke-opacity="0.055"/>
    </pattern>
  </defs>

  <rect width="1800" height="1200" fill="url(#bg)"/>
