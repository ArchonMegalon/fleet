id: media-factory
lifecycle: dispatchable
path: /docker/fleet/repos/chummer-media-factory
design_doc: /docker/chummercomplete/chummer-design/products/chummer/projects/media-factory.md
verify_cmd: bash scripts/ai/verify.sh
feedback_dir: feedback
state_file: .agent-state.json
enabled: true
accounts:
- acct-hub-a
- acct-shared-b
- acct-studio-a
- acct-chatgpt-b
- acct-chatgpt-archon
account_policy:
  preferred_accounts:
  - acct-chatgpt-archon
  - acct-hub-a
  burst_accounts:
  - acct-shared-b
  reserve_accounts:
  - acct-chatgpt-b
  - acct-studio-a
  allow_chatgpt_accounts: true
  allow_api_accounts: true
  spark_enabled: true
runner:
  sandbox: danger-full-access
  approval_policy: never
  exec_timeout_seconds: 5400
  verify_timeout_seconds: 1800
  always_continue: true
  avoid_permission_escalation: true
  config_overrides:
  - 'mcp_servers.ea.command="python3"'
  - 'mcp_servers.ea.args=["/docker/fleet/scripts/ea_mcp_bridge.py"]'
  - 'mcp_servers.ea.env_vars=["EA_MCP_BASE_URL","EA_MCP_API_TOKEN","EA_MCP_PRINCIPAL_ID","EA_MCP_TIMEOUT_SECONDS","EA_MCP_MODEL"]'
  - 'mcp_servers.ea.enabled_tools=["ea.list_skills","ea.get_skill","ea.compile_plan","ea.execute_plan","ea.execute_tool","ea.context_pack"]'
  - 'mcp_servers.ea.tool_timeout_sec=120'
  - 'mcp_servers.ea.required=false'
review:
  enabled: true
  mode: github
  trigger: manual_comment
  fallback_mode: local
  fallback_conditions: degraded_or_stalled
  required_before_queue_advance: true
  focus_template: for render-only contract boundaries, lifecycle regressions, and missing tests
  owner: ArchonMegalon
  repo: chummer6-media-factory
  base_branch: main
  branch_template: fleet/media-factory
  bot_logins:
  - codex
queue: []
queue_sources:
- kind: worklist
  path: WORKLIST.md
  mode: replace
- kind: next90_queue_staging
  path: /docker/fleet/.codex-studio/published/NEXT_90_DAY_QUEUE_STAGING.generated.yaml
  mode: append
  repos:
  - chummer6-media-factory
