product: chummer
version: 1
purpose: Canonical public FAQ entries for the downstream Chummer6 guide.
sections:
  - id: using_chummer6
    title: Using Chummer6
    entries:
      - question: Can I actually use this now?
        required: true
        answer: Yes, with honest caveats. There are usable public pages and a real preview installer shelf, but several areas are still explicitly marked preview. Read that as real but still moving, not imaginary.
      - question: Is it offline-safe?
        required: true
        answer: That is one of the main promises. Local-first and offline-ready behavior are part of the product story, and the public docs treat surviving bad connectivity as a real requirement.
      - question: Why would I trust it more than old opaque tool behavior?
        required: true
        answer: Because the project is pushing toward deterministic outcomes plus readable receipts and a clear source trail. The goal is not only to hand you a number, but to show how the number happened.
      - question: What is preview versus available today?
        required: true
        answer: Available today means there is a real public page or build you can touch right now. Preview in progress means the shape is visible and usable, but the support, release, or compatibility story is still moving.
      - question: What should I show a skeptical GM or player first?
        required: true
        answer: Start with WHAT_CHUMMER6_IS.md for the product pitch, then NOW/current-status.md for the honest caveats, then PARTS/core.md if the real argument is about trust in the math.
  - id: participation_and_preview
    title: Participation and preview
    entries:
      - question: How can I help?
        required: true
        answer: Start with public bug reports, guide feedback, and future-feature suggestions. If you want to go further, the guided contribution path exists for opt-in temporary support on top of the free baseline.
      - question: What is guided contribution?
        required: true
        answer: Guided contribution is an opt-in temporary support path for people who want to lend extra help on top of the free baseline. It is bounded, review-safe, and still not a bypass around governance.
      - question: Do I need to join guided contribution to help?
        required: true
        answer: No. Public bug reports, guide feedback, and future-feature suggestions still matter. Guided contribution is optional and additive, not the price of admission.
      - question: Should I use the public issue tracker for a crash?
        required: true
        answer: Use the in-product private crash path when diagnostics or logs are involved. Public issues stay best for public-safe reproducible bugs, guide feedback, and future-feature suggestions.
      - question: Why are some things preview-only?
        required: true
        answer: Because some surfaces are real enough to try while their support, release, or compatibility story is still catching up. Preview means shape can move, not that the product is pretending.
      - question: Will guided-preview lanes open wider later?
        required: true
        answer: The long-run intent is broader access, not a permanent paywall. Some early access windows may begin as guided previews while approvals, compatibility work, editorial effort, or support cost remain unusually expensive.
      - question: Can I participate privately?
        required: true
        answer: Yes. Public recognition should remain opt-in, and private participation should still be possible even when badges or leaderboards exist.
      - question: What are badges and leaderboards for?
        required: true
        answer: They are recognition and visibility layers, not authority. They should celebrate verified contribution without replacing review or rules truth.
  - id: deeper_sources
    title: If you want the deeper sources
    entries:
      - question: Where does the deeper plan live?
        required: true
        answer: In chummer6-design, which carries the shared product plan and public-generation rules.
      - question: Where does the actual code live?
        required: true
        answer: In the owning code repos. Chummer6 exists so you do not have to reverse-engineer the product story from commit archaeology.
      - question: Where do I propose public-facing changes?
        required: true
        answer: Use the Chummer6 issue tracker for public guide feedback, bug reports, and future-feature suggestions. That keeps normal users out of the design repo.
