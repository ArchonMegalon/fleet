project_groups:
- id: chummer-vnext
  lifecycle: live
  projects:
  - core
  - ui
  - hub
  - mobile
  - ui-kit
  - hub-registry
  - media-factory
  - design
  - guide
  mode: lockstep
  captain:
    priority: 200
    service_floor: 1
    shed_order: 10
    preemption_policy: slice_boundary
    admission_policy: reserve
  contract_sets:
  - session_events_vnext
  - runtime_dtos_vnext
  - explain_trace_vnext
  - asset_review_vnext
  milestone_source:
    kind: group_milestones
    path: program_milestones.yaml
  group_roles:
  - program_manager
  - contract_steward
  - auditor
  - healer
  deployment:
    public_surface:
      status: protected_preview
      summary: Public Chummer portal is live at chummer.run, but it still reflects the older multi-head preview shape rather than the current promoted split.
      targets:
      - name: portal root
        url: https://chummer.run
        status: protected_preview
        owner_project: hub
        surface: legacy public portal
      - name: hub preview
        url: https://chummer.run/hub/
        status: protected_preview
        owner_project: hub
        surface: hosted hub head
      - name: workbench preview
        url: https://chummer.run/blazor/
        status: protected_preview
        owner_project: ui
        surface: browser workbench preview
      - name: play preview
        url: https://chummer.run/session
        status: protected_preview
        owner_project: mobile
        surface: player and GM shell preview
      - name: coach preview
        url: https://chummer.run/coach/
        status: protected_preview
        owner_project: hub
        surface: coach preview
- id: solo-ea
  lifecycle: live
  projects:
  - ea
  mode: singleton
  captain:
    priority: 120
    service_floor: 1
    shed_order: 30
    preemption_policy: slice_boundary
    admission_policy: normal
  contract_sets: []
  milestone_source:
    kind: group_milestones
    path: program_milestones.yaml
  group_roles:
  - program_manager
  - auditor
  - healer
  deployment:
    public_surface:
      status: undeclared
      summary: ""
      targets: []
- id: solo-fleet
  lifecycle: live
  projects:
  - fleet
  mode: singleton
  captain:
    priority: 140
    service_floor: 1
    shed_order: 20
    preemption_policy: slice_boundary
    admission_policy: normal
  contract_sets: []
  milestone_source:
    kind: group_milestones
    path: program_milestones.yaml
  group_roles:
  - program_manager
  - auditor
  - healer
  deployment:
    public_surface:
      status: internal
      summary: Fleet control-plane services are internal-only and exposed through the local dashboard/admin/studio origin.
      targets:
      - name: dashboard
        url: http://127.0.0.1:18090
        status: internal
        owner_project: fleet
        surface: local operator dashboard
      - name: admin
        url: http://127.0.0.1:18090/admin
        status: internal
        owner_project: fleet
        surface: local operator admin
      - name: studio
        url: http://127.0.0.1:18090/studio
        status: internal
        owner_project: fleet
        surface: local fleet studio
