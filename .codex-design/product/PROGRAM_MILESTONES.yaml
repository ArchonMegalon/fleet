- id: E
  title: Product completion
  status: open
  goal: Finish the user-facing product once the seams are real.
  milestones:
  - id: E0
    title: Workbench complete
    owners:
    - chummer6-ui
    status: open
    exit:
    - Builder, compare, explain, publish, moderation, and admin workflows are complete
