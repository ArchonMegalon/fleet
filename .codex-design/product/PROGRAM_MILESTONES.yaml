  - id: E1
    title: Play complete
    owners:
    - chummer6-mobile
    status: open
    exit:
    - Player and GM play shells are complete across supported platforms.
  - id: E2
    title: Hub complete
    owners:
    - chummer6-hub-registry
    - chummer6-hub
    - chummer6-ui
    status: open
    exit:
    - Publication, installs, reviews, discovery, and compatibility are coherent end-to-end.
  - id: E2b
    title: Docs, feedback, and operator projection plane complete
    owners:
    - chummer6-hub
    - chummer6-design
    status: open
    exit:
    - Docs/help surfaces are integrated.
    - Feedback collection loops are integrated.
    - Operator projection boards exist without becoming systems of record.
  - id: E3
    title: Assistant plane complete
    owners:
    - chummer6-hub
    status: open
    exit:
