install_help_label: Need install help?
install_help_href: /help#install-update
update_posture_summary: The release page is the source of truth for the current preview channel, the recommended installer, and whether you should expect a straightforward update or a manual handoff.
default_public_channel_label: Preview channel
unpublished_build_label: Current preview build
build_label_prefix: Build
public_channel_labels:
  - id: stable
    label: Public release
  - id: preview
    label: Preview channel
  - id: docker
    label: Preview channel
  - id: local
    label: Preview channel
guest_gate_heading: Preview access
guest_gate_summary: Create a Chummer account first so the installer handoff, claim code, and recovery path stay attached to the same preview copy from first launch.
guest_gate_primary_label: Create account to get preview
guest_gate_secondary_label: Already have an account? Sign in
signed_in_dispatch_heading: Keep this install linked from the first launch
signed_in_dispatch_summary: Start the same published installer download, copy the short-lived claim code, and let Chummer attach this installed copy back to your account when it opens.
signed_in_dispatch_steps:
  - Start the installer from this signed-in handoff page.
  - Copy the short-lived claim code before you leave the browser.
  - Launch Chummer and use the first-launch handoff to link this copy back to your account.
  - Reopen Devices and access later if you need the same claim path again.
install_steps:
  - Download the recommended installer for your platform.
  - Run the installer and launch Chummer.
  - Create an account when you want download receipts, install handoff, recovery, and support history to stay attached.
  - Use Devices and access later if you need to reconnect a downloaded copy back to the same account.
account_required_install_steps:
  - Create your Chummer account first.
  - Start the recommended installer from the signed-in handoff page.
  - Run the installer and launch Chummer.
  - Keep the claim code or first-launch handoff attached so this copy lands in Devices and access automatically.
windows_requirements:
  - 64-bit Windows 10 or newer.
  - Enough free disk space for the installed preview plus future updates.
  - A normal user install path; no custom runtime selection needed for the recommended build.
  - Portable `.exe` handoff is a bounded fallback, not the primary public CTA.
linux_requirements:
  - 64-bit Linux with the currently published preview package support.
  - Use the recommended package when available; use manual packages only for advanced or support-directed installs.
  - Linux preview is secondary to Windows and should not promise more than the currently published package lane can support.
macos_requirements:
  - macOS is a real build lane, but it is not on the public preview shelf until a signed and notarized `.dmg` is promoted.
  - A built macOS `.dmg` may exist as internal release evidence without being guest-visible on `/downloads`.
  - Use the public downloads page and release-truth surfaces as the live source of truth before assuming the current preview is available for macOS.
