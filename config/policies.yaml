policies:
  max_parallel_runs: 8
  scheduler_interval_seconds: 15
  min_active_codex_workers: 3
  named_bridge_service_floor: 3
  auditor_interval_seconds: 30
  stale_heartbeat_seconds: 1800
  restart_cooldown_seconds: 30
  feedback_cooldown_seconds: 120
  rate_limit_backoff_base: 60
  chatgpt_usage_limit_probe_interval_seconds: 7200
  max_consecutive_failures: 3
  exec_timeout_seconds: 5400
  verify_timeout_seconds: 1800
  auto_heal_enabled: true
  auto_heal:
    categories:
      coverage: true
      review: true
      capacity: true
      contracts: true
    escalation_thresholds:
      coverage: 3
      review: 1
      capacity: 2
      contracts: 1
    playbooks:
      coverage:
        deterministic_steps:
        - detect uncovered scope
        - materialize scoped tasks
        - publish safe queue overlay
        llm_fallback: true
        verify_required: true
        max_attempts: 3
      review:
        deterministic_steps:
        - sync PR state
        - retrigger stale review
        - repair review lane
        llm_fallback: true
        verify_required: true
        max_attempts: 2
      capacity:
        deterministic_steps:
        - reroute eligible account
        - clear cooldown when safe
        - shed lower priority load
        llm_fallback: false
        verify_required: false
        max_attempts: 2
      contracts:
        deterministic_steps:
        - publish bridge shim
        - queue remediation slice
        - re-audit contract canon
        llm_fallback: true
        verify_required: true
        max_attempts: 2
  compile:
    freshness_hours:
      planned: 720
      scaffold: 336
      dispatchable: 168
      live: 168
      signoff_only: 720
  review_poll_interval_seconds: 30
  review_stall_sla_minutes: 3
  review_stall_fallback: complete_slice
  max_review_retriggers_per_head: 1
  review_local_fallback_enabled: true
  review_local_fallback_waiting_projects_threshold: 2
  review_local_fallback_throttled_wait_minutes: 1
  review_local_fallback_project_wait_minutes: 1
  review_local_fallback_oldest_wait_minutes: 10
  review_local_fallback_wakeup_failures: 2
  review_local_fallback_max_attempts_per_head: 1
  auto_signoff_completed_groups: true
  auto_approve_finding_keys:
  - project.uncovered_scope
  - project.queue_exhausted_with_uncovered_scope
  - project.milestone_coverage_incomplete
  - project.design_mirror_missing_or_stale
  - group.milestone_coverage_incomplete
  - group.program_coverage_incomplete
  - group.design_mirror_sync_incomplete
