groups:
  chummer-vnext:
    milestone_coverage_complete: false
    design_coverage_complete: false
    contract_blockers: []
    uncovered_scope:
      - The long-range Chummer roadmap is now centralized, but the per-repo milestone registry still needs to be split and mirrored repo-by-repo.
      - Session envelope canon, explain provenance, and play transport boundaries remain active implementation work, but they are no longer treated as pre-dispatch contract blockers.
      - Group-level milestone coverage is incomplete for contract reset and program backlog truth.
      - Shared lockstep blockers are not yet first-class runtime data in fleet.
      - The mobile play split is new and still needs package-only dependency enforcement plus play API contract canon.
      - "The play extraction is still incomplete: Presentation still owns session/mobile surfaces while `chummer-play` is scaffold-stage."
      - The next clean split, `chummer-ui-kit`, exists as a scaffold but is not yet a package-only shared UI boundary.
      - Registry/publication and media generation seams are strong enough for future repo splits, but those seams are still scaffold-stage rather than clean package-only boundaries.
      - "The next extraction wave is now real in repo form: `chummer-ui-kit`, `chummer-hub-registry`, and `chummer-media-factory` now exist as scaffolds, but each remains blocked on contract-plane preconditions."
      - "The media split still lacks a real `Chummer.Media.Contracts` package and a clean render-only boundary between asset/job lifecycle DTOs and narrative-generation, delivery, and campaign-context DTOs."
      - A dedicated `chummer-design` front door and repo-local mirror sync workflow are now required so cross-repo truth stops drifting between docs, group state, and code repos.
    remaining_milestones:
      - id: P0
        title: Contract Reset / Milestone 0 blockers
        status: open
      - id: P1
        title: Lockstep session shell readiness
        status: open
      - id: P2
        title: Explain / provenance contract alignment
        status: open
      - id: P3
        title: Asset review / generated artifact alignment
        status: open
      - id: P4
        title: Product backlog truthfulness
        status: open
      - id: P5
        title: UI kit package split for shared design-system ownership
        status: open
      - id: P6
        title: Hub registry repo split for immutable catalog and publication ownership
        status: open
      - id: P7
        title: Media factory contract split and render-only repo boundary
        status: open
      - id: P8
        title: Design repo front door and repo-local mirror sync
        status: open

projects:
  core:
    milestone_coverage_complete: false
    design_coverage_complete: false
    uncovered_scope:
      - Remaining hardening and integration work is still tracked as coarse queue slices rather than milestone-mapped task coverage.
      - Cross-repo contract reset work is not yet represented as explicit core milestones.
      - Non-engine authority surfaces such as presentation contracts, run-service contracts, browser infrastructure, and legacy tools still live in the core repo root.
      - "Temporary source-project leaks such as `Chummer.Presentation.Contracts` and `Chummer.RunServices.Contracts` still need deletion after the contract plane cutover."
    remaining_milestones:
      - id: A6
        title: Post-worklist hardening and contract alignment
        status: open

  ui:
    milestone_coverage_complete: false
    design_coverage_complete: false
    uncovered_scope:
      - Session PWA/mobile shell and Coach Web ownership still live in Presentation after the `chummer-play` split.
      - "Shared design tokens, shell chrome, and accessibility/state primitives still need a package-only `Chummer.Ui.Kit` boundary."
      - Contact and relationship graph UI
      - Heat, faction, and favor continuity views
      - Calendar, ledger, and downtime planner surfaces
      - Runtime inspector, RuleProfile, and RulePack diagnostics
      - Richer Hub client UX
      - Portrait Forge selection and reroll UX depth
      - NPC Persona Studio screens
      - Coach, Shadowfeed, player dispatch, and review workflows
      - Final accessibility, deployment, and browser-constraint signoff
    remaining_milestones:
      - id: B7
        title: Additional presentation responsibility coverage beyond B1-B6
        status: open

  hub:
    milestone_coverage_complete: false
    design_coverage_complete: false
    uncovered_scope:
      - Contract reset and relay/runtime alignment are not yet represented as explicit Hub milestones.
      - Additional Hub milestone families beyond the current queued work remain unmaterialized.
      - Group-level asset review and publication seams still need explicit milestone mapping.
      - "Dedicated `Chummer.Play.Contracts` and `/api/play/*` seams are not yet public package/API reality for the new play repo."
      - "The `chummer-hub-registry` split exists as a scaffold, but not yet as a clean repo/package boundary around catalog, publication, installs, and runtime bundle heads."
      - "The `chummer-media-factory` split exists as a scaffold, but not yet as a render-only asset/job boundary separated from orchestration and narrative-authoring DTOs."
      - "`Chummer.Run.Contracts.Media` still needs a clean split between render-only media DTOs and upstream narrative-generation, delivery, and session-aware orchestration DTOs."
      - "The missing `Chummer.Media.Contracts` package still prevents a dedicated media-factory repo from becoming a real package-only seam."
      - Legacy desktop/tooling clutter still shares the run-services repo root with hosted-service code.
    remaining_milestones:
      - id: C8
        title: Additional Hub milestone families beyond the current queued work
        status: open

  mobile:
    milestone_coverage_complete: false
    design_coverage_complete: false
    uncovered_scope:
      - "Package-only dependency boundaries for `Chummer.Engine.Contracts`, `Chummer.Play.Contracts`, and `Chummer.Ui.Kit` are not yet enforced in code."
      - Contract package naming is still inconsistent between the play repo docs and package props.
      - The mobile and play-mode shell split still needs explicit player and GM role shells plus local-first sync ownership.
      - Dedicated play API, offline cache, and installable PWA hardening work remains unmaterialized.
      - Bootstrap, browser session client, and event-log persistence code are still scaffold-stage placeholders.
      - "The play repo still depends on the future `Chummer.Ui.Kit` and `Chummer.Play.Contracts` package plane that is not yet fully real."
    remaining_milestones:
      - id: D0
        title: Contract canon and play repo bootstrap
        status: open
      - id: D1
        title: Player and GM play shell extraction
        status: open
      - id: D2
        title: Local-first sync and installable play hardening
        status: open

  design:
    milestone_coverage_complete: false
    design_coverage_complete: false
    uncovered_scope:
      - The new design repo exists, but it still needs repo-local mirror publishing into code repos for workers and GitHub review.
      - Ownership matrix, contract canon, blockers, and milestone truth still need to be kept current as the Chummer split wave progresses.
      - Review-guidance templates still need to be mirrored into the relevant code repos before review becomes fully design-aware.
    remaining_milestones:
      - id: E0
        title: Design front door bootstrap
        status: open
      - id: E1
        title: Repo-local mirror sync and review template rollout
        status: open

  media-factory:
    milestone_coverage_complete: false
    design_coverage_complete: false
    uncovered_scope:
      - The repo exists, but `Chummer.Media.Contracts` is not yet real as the canonical render-only package plane.
      - Media DTOs still need to be split cleanly between downstream render/job/asset lifecycle contracts and upstream narrative-authoring, delivery, and campaign-context contracts.
      - The asset kernel still needs manifests, binary storage, render jobs, previews, TTL, retention, and lineage before renderer-specific pipelines move here.
      - Run-services still owns the effective media seam, so this repo is scaffold-stage rather than a live render-only boundary.
    remaining_milestones:
      - id: M0
        title: Media contracts split and package-plane bootstrap
        status: open
      - id: M1
        title: Asset kernel and lifecycle backbone
        status: open
      - id: M2
        title: Deterministic document rendering
        status: open
      - id: M3
        title: Portrait Forge split
        status: open
      - id: M4
        title: Video pipeline split
        status: open
