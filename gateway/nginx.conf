events {}

http {
  server {
    listen 8090;
    server_name _;
    client_max_body_size 20m;
    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 5s;

    set $controller_upstream fleet-controller:8090;
    set $studio_upstream fleet-studio:8091;
    set $admin_upstream fleet-admin:8092;

    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    location = /health {
      proxy_pass http://$controller_upstream;
    }

    location /api/studio/ {
      proxy_pass http://$studio_upstream;
    }

    location /api/admin/ {
      proxy_pass http://$admin_upstream;
    }

    location /admin/ {
      proxy_pass http://$admin_upstream;
    }

    location = /admin {
      proxy_pass http://$admin_upstream;
    }

    location /studio/ {
      proxy_pass http://$studio_upstream;
    }

    location = /studio {
      proxy_pass http://$studio_upstream;
    }

    location / {
      proxy_pass http://$controller_upstream;
    }
  }
}
