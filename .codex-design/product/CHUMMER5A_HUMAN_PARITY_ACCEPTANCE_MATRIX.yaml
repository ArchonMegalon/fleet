gate_requirements:
  fail_closed_when_missing:
    - required_screenshots
    - runtime_receipt_for_opening_route
    - dialog_level_element_inventory_rows
    - explicit_reason_for_visual_or_behavioral_no
    - explicit_reason_for_non_removable_chummer6_only_control
