as_of: 2026-03-23
brand: Chummer6
hero:
  headline: Progress report for a product becoming a build machine.
  support: >-
    The project is moving from canon and architecture into scalable execution:
    package-scoped boosters, credit-aware control, cleaner public entry surfaces,
    and a clearer path toward parallel delivery.
  ctas:
    - label: See the program pulse
      href: "#program"
      kind: primary
    - label: Read the timeline
      href: "#timeline"
      kind: secondary
    - label: How the ETA works
      href: "#method"
      kind: secondary
phase_labels:
  - min_progress_percent: 0
    label: Foundations
  - min_progress_percent: 55
    label: Scale & stabilize
  - min_progress_percent: 85
    label: Public-fit polish
momentum_labels:
  - min_score: 18
    label: Very high
  - min_score: 10
    label: High
  - min_score: 4
    label: Steady
  - min_score: 1.5
    label: Moderate
  - min_score: 0.25
    label: Low
  - min_score: 0
    label: Quiet
eta_formula:
  remaining_weight_unit: 4.0
  scope_multiplier_divisor: 8.0
  activity_divisor: 18.0
  min_velocity: 0.6
  max_velocity: 1.8
  low_multiplier: 0.8
  high_multiplier: 1.35
  min_low_weeks: 1
  max_high_weeks: 16
method:
  progress_formula_version: public_progress_v1
  eta_formula_version: momentum_proxy_v1
  copy: >-
    Progress is a weighted estimate built from the current milestone map, grouped
    into public-facing product parts instead of repo names. The ETA is a
    momentum-based planning band, not a promise: it uses remaining milestone
    weight, recent repo activity, and uncovered scope breadth as a public proxy
    until weekly historical snapshots are published.
  limitations:
    - ETA is a momentum-based planning band, not a delivery promise.
    - The current repo state does not yet expose a durable public weekly progress history, so recent momentum is used as a proxy.
recent_movement:
  - Mission Control got a harder backbone.
  - The AI runtime got better at seeing real capacity.
  - The public entry story became clearer.
  - Workbench scope got easier to see.
  - Core is moving from split-state cleanup toward hardening.
  - Cloud and publishing are now the clearest long pole.
recent_movement_copy:
  Mission Control got a harder backbone.: Fleet shifted further toward package-scoped execution, stronger scope/capacity contracts, and a quartermaster that can reason about credits, work depth, review pressure, and drift instead of relying on ad hoc burst logic.
  The AI runtime got better at seeing real capacity.: The EA lane now exposes actual OneMinute credit posture and has been hardened around lease-aware routing, provider selection, occupancy, and review/audit scoping.
  The public entry story became clearer.: Design, Fleet, Hub, Registry, Media, and Mobile all refreshed public landing, auth, guide, and participation canon, reducing the chance that the public surface drifts away from the design source of truth.
  Workbench scope got easier to see.: The remaining desktop/browser UX work has been sliced into concrete milestone- and backlog-shaped queues instead of sitting as fuzzy later work.
  Core is moving from split-state cleanup toward hardening.: The current core wave is no longer about who owns what; it is about observability, disaster recovery, replay safety, retention, and finishing the last legacy purification passes.
  Cloud and publishing are now the clearest long pole.: The hosted stack is visibly moving, especially around public entry and email identity, but it still carries the largest remaining completion wave because registry depth, media execution, adapters, and broader hub product surfaces remain open.
closing:
  headline: The project no longer looks like a concept sketch.
  body: The most interesting change is not a single feature. It is that architecture, execution, public entry, and product canon are starting to reinforce each other. That is the point where a serious internal system turns into something people can eventually use, trust, and follow.
participation:
  headline: How to participate
  body: Lower sustained booster count directly slows visible progress. If you want the delivery curve to steepen, the next leverage point is more bounded participation through the public booster flow.
  cta_label: Open the participation page
