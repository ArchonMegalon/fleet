studio:
  max_parallel_runs: 1
  default_accounts:
  - acct-studio-api
  - acct-studio-a
  - acct-shared-b
  session_message_window: 8
  publish_feedback_note: true
  autonomy:
    enabled: true
    poll_seconds: 30
    auto_publish_recommended: true
    roles:
      designer:
        enabled: true
        target_type: group
        target_id: control-plane
        interval_seconds: 1800
        min_interval_seconds: 600
        title: Autonomous design contradiction sweep
      product_governor:
        enabled: true
        target_type: group
        target_id: control-plane
        interval_seconds: 600
        min_interval_seconds: 300
        title: Autonomous product pulse and reroute check
  roles:
    designer:
      accounts:
      - acct-studio-api
      - acct-ea-groundwork
      - acct-ea-groundwork-2
      - acct-studio-a
      - acct-shared-b
      models:
      - gpt-5.4
      - gpt-5.3-codex
      - ea-groundwork-gemini
      - gpt-5.3-codex-spark
      reasoning_effort: high
      sandbox: danger-full-access
      approval_policy: never
      exec_timeout_seconds: 1800
      skip_git_repo_check: true
      config_overrides:
      - 'mcp_servers.ea.command="python3"'
      - 'mcp_servers.ea.args=["/docker/fleet/scripts/ea_mcp_bridge.py"]'
      - 'mcp_servers.ea.env_vars=["EA_MCP_BASE_URL","EA_MCP_API_TOKEN","EA_MCP_PRINCIPAL_ID","EA_MCP_TIMEOUT_SECONDS","EA_MCP_MODEL"]'
      - 'mcp_servers.ea.enabled_tools=["ea.list_skills","ea.get_skill","ea.compile_plan","ea.execute_plan","ea.execute_tool","ea.context_pack"]'
      - 'mcp_servers.ea.tool_timeout_sec=120'
      - 'mcp_servers.ea.required=false'
    product_governor:
      accounts:
      - acct-studio-api
      - acct-ea-fleet
      - acct-ea-groundwork
      - acct-studio-a
      - acct-shared-b
      models:
      - gpt-5.4
      - gpt-5.3-codex
      - ea-groundwork-gemini
      - ea-gemini-flash
      - gpt-5.3-codex-spark
      reasoning_effort: high
      sandbox: danger-full-access
      approval_policy: never
      exec_timeout_seconds: 1800
      skip_git_repo_check: true
      config_overrides:
      - 'mcp_servers.ea.command="python3"'
      - 'mcp_servers.ea.args=["/docker/fleet/scripts/ea_mcp_bridge.py"]'
      - 'mcp_servers.ea.env_vars=["EA_MCP_BASE_URL","EA_MCP_API_TOKEN","EA_MCP_PRINCIPAL_ID","EA_MCP_TIMEOUT_SECONDS","EA_MCP_MODEL"]'
      - 'mcp_servers.ea.enabled_tools=["ea.list_skills","ea.get_skill","ea.compile_plan","ea.execute_plan","ea.execute_tool","ea.context_pack"]'
