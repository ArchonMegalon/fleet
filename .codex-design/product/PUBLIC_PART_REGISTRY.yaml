product: chummer
version: 1
purpose: Public-safe summaries for Chummer6 part pages.
parts:
  - id: design
    title: Design
    public_tagline: The long-range product map and truth filter.
    you_touch_this_when: You want to understand why a feature exists, what is real today, or where to go deeper after the friendly tour.
    why_you_care: It keeps the public story, the landing page, the guide, and the future lanes tied to one canonical plan instead of a pile of clever guesses.
    what_you_notice:
      - clearer labels about what is real now, what is preview, and what is still future-facing
      - a stable product story before you dive into repo or implementation detail
      - one place that keeps the public-facing surfaces aligned
    public_noteworthy_limits:
      - you should not need this first for normal use
      - it is the map, not the running software
    current_truth: Design already owns the public landing posture, guide policy, horizons, participation language, and the line between public story and deeper source material.
    go_deeper_links:
      - ../NOW/current-status.md
      - ../WHERE_TO_GO_DEEPER.md
  - id: core
    title: Core
    public_tagline: The deterministic rules engine.
    you_touch_this_when: A number looks wrong, a modifier needs explaining, or you want proof instead of vibe-based tool behavior.
    why_you_care: This is where Chummer earns trust. If the math cannot be reproduced and explained here, the rest of the product becomes expensive theater.
    what_you_notice:
      - reproducible rules outcomes
      - readable receipts for why a pool or result changed
      - a cleaner boundary between rules truth and everything that only decorates it
    public_noteworthy_limits:
      - this is not the hosted service layer
      - this is not the table-facing shell by itself
    current_truth: Core is already the rules-truth spine, and the current work is about keeping it strict enough that future explain, play, and simulation layers can trust it.
    go_deeper_links:
      - ../WHAT_CHUMMER6_IS.md
      - ../WHERE_TO_GO_DEEPER.md
  - id: ui
    title: UI
    public_tagline: The workbench and inspect-everything surface.
    you_touch_this_when: You want the heavy prep view, comparison tools, bigger inspectors, or the place where you stare at a build until it confesses.
    why_you_care: This is where Chummer stops feeling mystical and starts feeling inspectable.
    what_you_notice:
      - bigger prep and review surfaces
      - clearer build inspectors and comparison flows
      - a stronger distinction between deep prep and live table use
    public_noteworthy_limits:
      - this is not the player-first live shell
      - some workbench polish is still catching up to the cleaner split
    current_truth: UI is the prep-heavy head, and the current cleanup work is about keeping that power without quietly reclaiming play-first or hosted jobs.
    go_deeper_links:
      - ../START_HERE.md
      - ../WHERE_TO_GO_DEEPER.md
  - id: mobile
    title: Mobile
    public_tagline: The session shell you feel at the table.
    you_touch_this_when: You care about actual play, reconnecting across devices, or surviving a bad signal without losing the session.
    why_you_care: This is the jump from prep software to software that can stay useful while a real session is happening.
    what_you_notice:
      - stronger local-first and offline-safe posture
      - session continuity instead of fragile single-device assumptions
      - a table-facing shell that is separate from the heavy workbench view
    public_noteworthy_limits:
      - this is still the next major seam to finish cleanly
      - some play surfaces remain preview while the session stack hardens
    current_truth: Mobile is where the live-session promise becomes real, and the current work is about event logs, cache, replay, and sync rather than cosmetic flash.
    go_deeper_links:
      - ../NOW/public-surfaces.md
      - ../WHERE_TO_GO_DEEPER.md
  - id: hub
    title: Hub
    public_tagline: The online side that keeps identity, coordination, and hosted participation boring.
    you_touch_this_when: You sign in, sync a hosted surface, follow what is coming next, or use the public participation and recognition flows.
    why_you_care: It keeps shared coordination, hosted previews, accounts, and community participation from turning into manual glue work.
    what_you_notice:
      - sign-in and account surfaces
      - public landing, home, and participation entry points
      - shared coordination, hosted status, and recognition views that do not ask you to understand the server internals first
    public_noteworthy_limits:
      - it is not where the rules math becomes true
      - some hosted surfaces are still preview rather than the final promoted shape
    current_truth: Hub is already the hosted front door for identity, landing/home projection, participation, and community views, but it is still tightening the line between user-facing coordination and deeper operator machinery.
    go_deeper_links:
      - ../NOW/current-status.md
      - ../WHERE_TO_GO_DEEPER.md
  - id: ui-kit
    title: UI Kit
    public_tagline: The shared visual vocabulary.
    you_touch_this_when: You notice the product feeling more coherent instead of looking like unrelated tools wearing matching coats by accident.
    why_you_care: Shared visual primitives keep the split from feeling like several products pretending to be one.
    what_you_notice:
      - more consistent chrome, badges, banners, and dense-data presentation
      - fewer one-off UI reinventions in each surface
      - stronger accessibility and reusable component posture
    public_noteworthy_limits:
      - it is a shared package layer, not a product head by itself
      - it only counts when the other heads visibly get smaller because it exists
    current_truth: UI Kit is real enough to matter, and the next proof point is whether the rest of the product can consume it instead of rebuilding visual seams locally.
    go_deeper_links:
      - ../NOW/current-status.md
      - ../WHERE_TO_GO_DEEPER.md
  - id: hub-registry
    title: Hub Registry
    public_tagline: The artifact shelf, install truth, and compatibility record.
    you_touch_this_when: You care about what exists, what can be installed, what is published, or whether an artifact can be trusted and reused.
    why_you_care: Without this, artifacts turn into a warehouse full of unlabeled boxes and compatibility folklore.
    what_you_notice:
      - cleaner artifact metadata and publication posture
      - a more believable path from preview outputs to shareable or installable artifacts
      - compatibility and moderation signals that can stay on the record
    public_noteworthy_limits:
      - this is not the render plant
      - this is not the rules engine
    current_truth: Hub Registry is the growing record layer for published artifacts and compatibility truth, and it becomes more visible as the public artifact story gets richer.
    go_deeper_links:
      - ../NOW/public-surfaces.md
      - ../WHERE_TO_GO_DEEPER.md
  - id: media-factory
    title: Media Factory
    public_tagline: The render-only asset plant.
    you_touch_this_when: You care about finished images, teaser media, dossiers, narrated packets, or other polished outputs that still need provenance.
    why_you_care: This is how the product can look finished without letting style quietly rewrite the facts.
    what_you_notice:
      - cleaner asset generation and preview flows
      - a stronger line between content rendering and product meaning
      - a path toward richer teaser and artifact media without turning every repo into a render farm
    public_noteworthy_limits:
      - this is not the decision-maker for what a session means
      - it should stay render-only even when the outputs get more ambitious
    current_truth: Media Factory is the dedicated place for render jobs and asset lifecycle, and the current work is about making richer outputs possible without blurring provenance or ownership.
    go_deeper_links:
      - ../NOW/public-surfaces.md
      - ../WHERE_TO_GO_DEEPER.md
